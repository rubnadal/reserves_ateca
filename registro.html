<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Solicitud de Acceso</title>

  <?!= include('i18n-ca'); ?>
  <?!= include('i18n-es'); ?>
  <?!= include('i18n-core'); ?>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

  <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden" id="card">
    <div class="bg-gradient-to-r from-blue-600 to-indigo-700 p-6 text-center">
      <div class="mx-auto bg-white/20 w-16 h-16 rounded-full flex items-center justify-center mb-4 backdrop-blur-sm">
        <span class="text-3xl">👋</span>
      </div>
      <h1 class="text-2xl font-bold text-white" data-i18n="registro.welcome">¡Bienvenido/a!</h1>
      <p class="text-blue-100 text-sm mt-1" data-i18n="registro.subtitle">Sistema de Reservas</p>
    </div>

    <div class="p-8">
      <div id="formSection">
        <p class="text-gray-600 mb-6 text-center text-sm" data-i18n="registro.description">
          No estás registrado en el sistema. Por favor, completa tus datos para solicitar acceso.
        </p>

        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1" data-i18n="registro.emailLabel">Tu Correo Electrónico</label>
            <input type="email" id="emailInput" value="<?= email ?>"
                   class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 bg-gray-50"
                   placeholder="nombre@colegio.com"
                   data-i18n-attr="placeholder:registro.emailPlaceholder">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1" data-i18n="registro.nameLabel">Nombre y Apellidos</label>
            <input type="text" id="nombreInput" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="Ej: Juan Pérez"
                   data-i18n-attr="placeholder:registro.namePlaceholder">
          </div>

          <button onclick="enviarSolicitud()" id="btnEnviar" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-lg transform transition hover:-translate-y-0.5 active:translate-y-0" data-i18n="registro.submitBtn">
            🚀 Enviar Solicitud
          </button>
        </div>
      </div>

      <div id="statusSection" class="hidden text-center py-4">
        <div id="spinner" class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mx-auto mb-4"></div>
        <h3 id="statusTitle" class="text-lg font-bold text-gray-800" data-i18n="registro.sending">Enviando...</h3>
        <p id="statusDesc" class="text-gray-500 text-sm mt-2" data-i18n="registro.sendingDesc">Por favor espera.</p>
      </div>
    </div>
  </div>

  <script>
    window.addEventListener('DOMContentLoaded', function() {
      document.title = window.t('registro.title');
      applyI18n(document);
    });

    function enviarSolicitud() {
      const nombre = document.getElementById('nombreInput').value.trim();
      const email = document.getElementById('emailInput').value.trim();

      if (!nombre || !email) {
        alert(window.t('registro.alertMissing'));
        return;
      }

      if (!email.includes('@') || !email.includes('.')) {
        alert(window.t('registro.alertInvalidEmail'));
        return;
      }

      document.getElementById('formSection').classList.add('hidden');
      document.getElementById('statusSection').classList.remove('hidden');

      google.script.run
        .withSuccessHandler(() => {
           document.getElementById('spinner').classList.add('hidden');
           document.getElementById('statusTitle').textContent = window.t('registro.successTitle');
           document.getElementById('statusTitle').className = "text-xl font-bold text-green-600";
           document.getElementById('statusDesc').innerHTML = window.t('registro.successDesc');
        })
        .withFailureHandler((err) => {
           document.getElementById('formSection').classList.remove('hidden');
           document.getElementById('statusSection').classList.add('hidden');
           alert(window.t('registro.errorPrefix') + err.message);
        })
        .procesarSolicitudRegistro(nombre, email);
    }
  </script>
</body>
</html>
