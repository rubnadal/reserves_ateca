/* LÓGICA DE CONFIRMACIÓN (MODAL INTELIGENTE) */
let accionConfirmadaCallback = null;

function mostrarConfirmacion(titulo, mensaje, callbackAccion) {
  const modal = document.getElementById('modalConfirmacion');
  
  // 🛑 FIX: ESCAPE DE PRISIÓN (La magia está aquí)
  // Si el modal está atrapado dentro de una pestaña, lo movemos al body
  // para que se centre correctamente en medio de la ventana visible.
  if (modal && modal.parentNode !== document.body) {
    document.body.appendChild(modal);
  }
  
  // 1. Configurar Textos
  document.getElementById('confirmTitle').innerText = titulo;
  document.getElementById('confirmMessage').innerHTML = mensaje;
  
  // 2. Guardar acción
  accionConfirmadaCallback = callbackAccion;
  
  // 3. Configurar Botón Confirmar (Clonamos para limpiar eventos viejos)
  const btn = document.getElementById('btnConfirmarAccion');
  const newBtn = btn.cloneNode(true);
  btn.parentNode.replaceChild(newBtn, btn);
  
  newBtn.addEventListener('click', function() {
    if (accionConfirmadaCallback) accionConfirmadaCallback();
    cerrarConfirmacion();
  });

  // 4. Mostrar
  modal.classList.remove('hidden');
}

function cerrarConfirmacion() {
  const modal = document.getElementById('modalConfirmacion');
  if (modal) modal.classList.add('hidden');
  accionConfirmadaCallback = null;
}

// --- 1. GESTOR DE BARRA DE GUARDADO (FIX MÓVIL + COLCHÓN DE AIRE ☁️) ---
const SaveBarManager = {
  show: function(subtitle, onSave, onDiscard) {
    const bar = document.getElementById('globalSaveBar');
    if(!bar) return;

    // Fix Sticky: Mover al body si está atrapado
    if (bar.parentNode !== document.body) {
      document.body.appendChild(bar);
    }

    const btnSave = document.getElementById('btnGlobalSave');
    const btnDiscard = document.getElementById('btnGlobalDiscard');
    const subLabel = document.getElementById('saveBarSubtitle');

    // 1. TEXTO (Solo si cambia)
    if (subLabel && subLabel.textContent !== subtitle) {
        subLabel.textContent = subtitle;
    }

    // 2. ACCIONES (Sin recrear botones para evitar parpadeo)
    if(btnSave) btnSave.onclick = (e) => { e.preventDefault(); onSave(); };
    if(btnDiscard) btnDiscard.onclick = (e) => { e.preventDefault(); onDiscard(); };

    // 3. MOSTRAR + COLCHÓN
    if (!bar.classList.contains('translate-y-0')) {
        bar.classList.remove('translate-y-32', 'opacity-0', 'pointer-events-none');
        bar.classList.add('translate-y-0', 'opacity-100', 'pointer-events-auto');
        
        // 🔥 Padding extra al body para que la barra no tape el final de la tabla en móvil
        document.body.classList.add('pb-32'); 
    }
  },

  hide: function() {
    const bar = document.getElementById('globalSaveBar');
    if(bar) {
      if (bar.classList.contains('translate-y-0')) {
          bar.classList.remove('translate-y-0', 'opacity-100', 'pointer-events-auto');
          bar.classList.add('translate-y-32', 'opacity-0', 'pointer-events-none');
          
          // 🔥 Quitamos el padding extra
          document.body.classList.remove('pb-32');

          const btnSave = document.getElementById('btnGlobalSave');
          const btnDiscard = document.getElementById('btnGlobalDiscard');
          if(btnSave) btnSave.onclick = null;
          if(btnDiscard) btnDiscard.onclick = null;
      }
    }
  }
};

/* ==========================================
   5️⃣ INICIALIZACIÓN DE LISTENERS (MASTER MIX 🎧)

function setupAdminListeners() {

  // 1. RECUPERAMOS TUS FIXES VISUALES ANTIGUOS
  if (typeof fixMenusFlotantes === 'function') fixMenusFlotantes();
  
  // 2. INICIALIZAR COMPONENTES EXTERNOS (Iconify, etc.)
  if (typeof setupIconifySelector === 'function') setupIconifySelector(); // Si usas la versión antigua
  // Si usas mi versión nueva de iconos, no hace falta llamar a nada aquí, va solo.

  // 3. GESTIÓN DE TABS (PESTAÑAS)
  const tabs = document.querySelectorAll('.admin-subtab');
  
  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      // --- A. GESTIÓN VISUAL ---
      // 1. Quitar active a todos los botones
      tabs.forEach(t => t.classList.remove('active'));
      // 2. Ocultar todas las secciones
      document.querySelectorAll('.admin-section').forEach(sec => {
        sec.classList.add('hidden');
        sec.classList.remove('active'); // Por si acaso usabas esta clase
      });
      
      // 3. Activar botón actual
      tab.classList.add('active');
      
      // 4. Mostrar sección actual
      const sectionName = tab.getAttribute('data-section');
      const targetSection = document.getElementById(`admin-section-${sectionName}`);
      
      if (targetSection) {
        targetSection.classList.remove('hidden');
        targetSection.classList.add('active');
      } else {
        console.error(`❌ No existe la sección: admin-section-${sectionName}`);
        return;
      }

      // --- B. RENDERIZADO DE DATOS (Carga lo que toca) ---
      
      try {
        if (sectionName === 'recursos') renderTablaRecursos();
        
        if (sectionName === 'tramos') renderTablaTramos();
        
        if (sectionName === 'disponibilidad') {
            // Cargar solicitudes recurrentes para badge y panel pendientes global
            if (typeof cargarSolicitudesRecurrentesGlobal === 'function') {
              cargarSolicitudesRecurrentesGlobal();
            }

            if(typeof DispState !== 'undefined' && DispState.recursoId) {
                cargarMatrizDisponibilidad(DispState.recursoId);
            } else {
                // Si es la primera vez, renderizamos el selector vacío o inicial
                if(typeof renderSelectRecursos === 'function') renderSelectRecursos();
            }
        }
        
        if (sectionName === 'cursos') {
             if (typeof inicializarCursos === 'function') inicializarCursos();
             else renderTablaCursos();
        }
        
        if (sectionName === 'usuarios') renderTablaUsuarios();
        
        if (sectionName === 'reservas') {
             if(typeof renderTablaReservas === 'function') renderTablaReservas();
        }
        
        if (sectionName === 'config') renderConfiguracion();

        if (sectionName === 'recurrentes') {
          if (typeof cargarSolicitudesRecurrentes === 'function') cargarSolicitudesRecurrentes();
        }

      } catch (err) {
        console.error(`❌ Error pintando ${sectionName}:`, err);
      }
    });
  });

  // 4. BUSCADORES
  const searchCursos = document.getElementById('buscadorCursos');
  if (searchCursos) {
    searchCursos.addEventListener('input', (e) => {
       if(typeof filtrarCursos === 'function') filtrarCursos(e.target.value);
    });
  }
}

// --- 1. HELPERS SEGUROS (Locales para evitar conflictos) ---

// Limpiador de HTML para evitar inyecciones (XSS)
const safeHtmlRes = (str) => {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
};

// Extractor de número de tramo (Usa el global si existe, sino usa este local)
const getTramoNum = (idTramo) => {
  if (typeof window.extraerNumeroTramo === 'function') {
    return window.extraerNumeroTramo(idTramo);
  }
  // Fallback local por si acaso
  const match = String(idTramo || '').match(/\d+/);
  return match ? parseInt(match[0], 10) : 999;
};

// --- 2. INICIALIZACIÓN ---
function inicializarReservas() {
  // Validación robusta
  if (!AdminState || !AdminState.reservas) return;
  
  console.log('📚 Inicializando Reservas...');
  
  // Renderizar la tabla por primera vez
  renderTablaReservas();
}

// --- 3. RENDERIZADO PRINCIPAL ---
function renderTablaReservas() {
  const tbody = document.getElementById('tablaReservasBody');
  if (!tbody) return;

  // Si no hay datos, mostrar mensaje vacío
  if (!AdminState.reservas || AdminState.reservas.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6" class="text-center py-12 text-gray-400 italic">No hay reservas registradas</td></tr>`;
    document.getElementById('totalReservasCount').innerText = '0';
    return;
  }

  // 🔥 TRUCO PRO: Guardar la posición del scroll antes de borrar la tabla
  // Buscamos el contenedor padre que tiene el scroll (habitualmente el div que envuelve la tabla)
  const scrollContainer = tbody.closest('.overflow-auto') || tbody.parentElement;
  const prevScrollTop = scrollContainer ? scrollContainer.scrollTop : 0;

  // Limpiar tabla
  tbody.innerHTML = '';
  
  // Obtener filtro
  const filtro = document.getElementById('buscadorReservas')?.value.toLowerCase() || '';

  // --- A. PREPARACIÓN DE MAPAS (Optimización O(1)) ---
  const usuariosMap = {};
  (AdminState.usuarios || []).forEach(u => {
    const email = String(u.Email || u.Email_Usuario || '').toLowerCase();
    if (email) usuariosMap[email] = u.Nombre || u.Nombre_Completo || u.Email_Usuario;
  });

  const recursosMap = {};
  (AdminState.recursos || []).forEach(r => {
    const id = String(r.id_recurso || r.ID_Recurso || '').toLowerCase();
    if (id) recursosMap[id] = {
      nombre: r.nombre_recurso || r.Nombre || r.nombre || r.ID_Recurso,
      icono: r.icono || 'mdi:cube-outline'
    };
  });

  // --- B. PROCESADO Y FILTRADO ---
  const hoyStr = new Date().toISOString().split('T')[0];
  const { fechaInicio, fechaFin } = getFechasFiltroPeriodo();
  const fechaInicioStr = fechaInicio ? fechaInicio.toISOString().split('T')[0] : null;
  const fechaFinStr = fechaFin ? fechaFin.toISOString().split('T')[0] : null;

  const lista = AdminState.reservas
    .map(reserva => {
      const emailKey = String(reserva.Email_Usuario || '').toLowerCase();
      const recursoKey = String(reserva.ID_Recurso || '').toLowerCase();
      const recursoInfo = recursosMap[recursoKey] || { nombre: reserva.ID_Recurso || 'Recurso eliminado', icono: 'mdi:cube-outline' };

      return {
        ...reserva,
        // Usamos los mapas para obtener nombres bonitos
        nombreUsuario: usuariosMap[emailKey] || reserva.Email_Usuario || 'Desconocido',
        nombreRecurso: recursoInfo.nombre,
        iconoRecurso: recursoInfo.icono
      };
    })
    .filter(r => {
      // Filtro de texto
      if (filtro) {
        const coincide = (
          String(r.nombreUsuario).toLowerCase().includes(filtro) ||
          String(r.Email_Usuario).toLowerCase().includes(filtro) ||
          String(r.nombreRecurso).toLowerCase().includes(filtro) ||
          String(r.Fecha).toLowerCase().includes(filtro) ||
          String(r.Estado).toLowerCase().includes(filtro)
        );
        if (!coincide) return false;
      }

      // Filtro de período
      if (fechaInicioStr || fechaFinStr) {
        const fechaReserva = r.Fecha || '';
        if (fechaInicioStr && fechaReserva < fechaInicioStr) return false;
        if (fechaFinStr && fechaReserva > fechaFinStr) return false;
      }

      // Filtro de tipo (normal/recurrente)
      if (AdminState.filtroReservasTipo !== 'todas') {
        const esRecurrente = !!(r.ID_Solicitud_Recurrente || r.id_solicitud_recurrente);
        if (AdminState.filtroReservasTipo === 'recurrente' && !esRecurrente) return false;
        if (AdminState.filtroReservasTipo === 'normal' && esRecurrente) return false;
      }

      return true;
    });

  // Debug: mostrar cuántas reservas recurrentes hay
  const totalRecurrentes = AdminState.reservas.filter(r => !!(r.ID_Solicitud_Recurrente || r.id_solicitud_recurrente)).length;
  console.log(`📊 Total reservas: ${AdminState.reservas.length}, Recurrentes: ${totalRecurrentes}, Filtro: ${AdminState.filtroReservasTipo}, Resultado: ${lista.length}`);

  // --- C. ORDENACIÓN MULTINIVEL ---
  lista.sort((a, b) => {
    const aFecha = a.Fecha || '';
    const bFecha = b.Fecha || '';
    const aEstado = (a.Estado || 'Confirmada').toLowerCase();
    const bEstado = (b.Estado || 'Confirmada').toLowerCase();
    
    const aEsPasado = aFecha < hoyStr;
    const bEsPasado = bFecha < hoyStr;
    const aEsCancelada = aEstado === 'cancelada';
    const bEsCancelada = bEstado === 'cancelada';
    
    // 1. Prioridad por Estado (Activas > Canceladas > Pasadas)
    const aCat = aEsPasado ? 2 : (aEsCancelada ? 1 : 0);
    const bCat = bEsPasado ? 2 : (bEsCancelada ? 1 : 0);
    if (aCat !== bCat) return aCat - bCat;
    
    // 2. Fecha (Más reciente primero)
    if (bFecha !== aFecha) return bFecha > aFecha ? 1 : -1;
    
    // 3. Recurso (Alfabético)
    const aRecurso = (a.nombreRecurso || '').toLowerCase();
    const bRecurso = (b.nombreRecurso || '').toLowerCase();
    if (aRecurso !== bRecurso) return aRecurso.localeCompare(bRecurso);
    
    // 4. Tramo (Numérico usando el helper seguro)
    return getTramoNum(a.ID_Tramo) - getTramoNum(b.ID_Tramo);
  });

  // Actualizar contador visual
  const countSpan = document.getElementById('totalReservasCount');
  if(countSpan) countSpan.innerText = lista.length;

  if (lista.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6" class="text-center py-12 text-gray-400 bg-gray-50/50 italic">No hay coincidencias con la búsqueda</td></tr>`;
    return;
  }

  // --- D. RENDERIZADO DOM (DocumentFragment) ---
  const fragment = document.createDocumentFragment();

  lista.forEach(reserva => {
    const tr = document.createElement('tr');
    const estado = reserva.Estado || 'Confirmada';

    // Determinar si la reserva ya pasó (incluyendo tramos del día actual)
    let esPasado = (reserva.Fecha || '') < hoyStr;

    // Si es hoy, verificar si el tramo ya pasó
    if (!esPasado && reserva.Fecha === hoyStr) {
      const tramo = AdminState.tramos?.find(t => t.id_tramo === reserva.ID_Tramo);
      if (tramo && tramo.hora_fin) {
        const ahora = new Date();
        const [horaFin, minFin] = tramo.hora_fin.split(':').map(Number);
        const horaFinReserva = new Date();
        horaFinReserva.setHours(horaFin, minFin, 0, 0);
        if (ahora > horaFinReserva) {
          esPasado = true;
        }
      }
    }
    
    // Clases dinámicas
    tr.className = `group hover:bg-blue-50/30 transition-all border-b border-gray-100 ${esPasado ? 'opacity-60 grayscale-[0.8]' : ''}`;

    // Fecha formateada (YYYY-MM-DD -> DD/MM/YYYY)
    const fechaEsp = (reserva.Fecha && reserva.Fecha.includes('-')) 
      ? reserva.Fecha.split('-').reverse().join('/') 
      : reserva.Fecha;

    // Badges de Estado
    let badgeClass = 'bg-emerald-100 text-emerald-700 border-emerald-200';
    let iconState = 'mdi:check-circle-outline';
    
    if(estado === 'Cancelada') { 
        badgeClass = 'bg-red-50 text-red-600 border-red-100'; 
        iconState = 'mdi:close-circle-outline'; 
    } else if(estado === 'Pendiente') {

// --- 4. ACCIÓN: CANCELAR RESERVA ---
function cancelarReserva(idReserva) {
  mostrarConfirmacion(
    '¿Cancelar esta reserva?', 
    'Esta acción liberará el recurso y notificará al usuario.',
    function() {
      showLoading();
      
      google.script.run
        .withSuccessHandler(res => {
          hideLoading();
          
          if (res.success) {
            // --- ACTUALIZACIÓN OPTIMISTA ---
            const index = AdminState.reservas.findIndex(r => String(r.ID_Reserva) === String(idReserva));
            
            if (index !== -1) {
                // Actualizamos el dato localmente
                AdminState.reservas[index].Estado = 'Cancelada';
                
                // Repintamos la tabla (que ahora mantendrá el scroll)
                renderTablaReservas();
                
                showToast('success', 'Reserva cancelada correctamente');
            } else {
                // Si no se encuentra (raro), recargamos todo
                if (typeof loadAdminData === 'function') loadAdminData();
            }

          } else {
            showToast('error', res.error || 'Error al cancelar');
          }
        })
        .withFailureHandler(err => {
          hideLoading();
          showToast('error', 'Error de conexión: ' + err);
        })
        .adminCancelarReserva(idReserva);
    }
  );
}

/**
 * Filtrar reservas por período de tiempo
 */
function filtrarReservasPorPeriodo(periodo) {
  AdminState.filtroReservasPeriodo = periodo;

  // Actualizar botones
  document.querySelectorAll('[data-filtro-periodo]').forEach(btn => {
    const btnPeriodo = btn.dataset.filtroPeriodo;
    if (btnPeriodo === periodo) {
      btn.classList.add('bg-blue-600', 'text-white');
      btn.classList.remove('bg-gray-100', 'text-gray-700', 'hover:bg-gray-200');
    } else {
      btn.classList.remove('bg-blue-600', 'text-white');
      btn.classList.add('bg-gray-100', 'text-gray-700', 'hover:bg-gray-200');
    }
  });

}

/**
 * Filtrar reservas por tipo (normal/recurrente)
 */
function filtrarReservasPorTipo(tipo) {
  AdminState.filtroReservasTipo = tipo;

  // Actualizar botones
  document.querySelectorAll('[data-filtro-tipo]').forEach(btn => {

    }
  });

  renderTablaReservas();
}

/**
 * Obtener fechas límite según el período seleccionado
 */
function getFechasFiltroPeriodo() {
  const hoy = new Date();
  hoy.setHours(0, 0, 0, 0);

  let fechaInicio = new Date(hoy);
  let fechaFin = null;

  switch (AdminState.filtroReservasPeriodo) {
    case 'semana':
      // Desde hoy hasta el domingo de esta semana
      fechaFin = new Date(hoy);
      fechaFin.setDate(hoy.getDate() + (7 - hoy.getDay()));
      break;

    case '2semanas':
      // Desde hoy hasta dentro de 2 semanas
      fechaFin = new Date(hoy);
      fechaFin.setDate(hoy.getDate() + 14);
      break;

    case 'mes':
      // Desde hoy hasta fin de mes
      fechaFin = new Date(hoy.getFullYear(), hoy.getMonth() + 1, 0);
      break;

    case 'todas':
    default:
      // Sin límites
      fechaInicio = null;
      fechaFin = null;
      break;
  }

  return { fechaInicio, fechaFin };
}

// A. Mostrar/Ocultar Dropdown (Z-Index Fix)
function toggleDropdownRecurso(index, tipo, event) {
  if (event) { event.stopPropagation(); event.preventDefault(); }

  const dropdown = document.getElementById(`dropdown-${tipo}-${index}`);
  const container = document.getElementById(`container-${tipo}-${index}`);
  
  const estabaAbierto = dropdown && !dropdown.classList.contains('hidden');

  // Cerrar todos
  document.querySelectorAll('[id^="dropdown-"]').forEach(d => d.classList.add('hidden'));
  document.querySelectorAll('[id^="container-"]').forEach(c => c.classList.remove('z-50'));

  if (!estabaAbierto && dropdown && container) {
    dropdown.classList.remove('hidden');
    container.classList.add('z-50'); // Elevar sobre lo demás
    
    // Auto-cierre
    const closeListener = () => {
        dropdown.classList.add('hidden');
        container.classList.remove('z-50');
        document.removeEventListener('click', closeListener);
    };
    setTimeout(() => document.addEventListener('click', closeListener), 0);
  }
}

// B. ACTUALIZACIÓN QUIRÚRGICA (Aquí está la magia 🪄)
// En lugar de renderizar toda la tabla, tocamos solo los elementos DOM necesarios
function actualizarDropdownRecurso(index, campo, valor) {
  // 1. Actualizar Dato en Memoria
  AdminState.recursos[index][campo] = valor;

  // 2. Actualizar Visualmente solo lo que cambió
  if (campo === 'tipo') {
      const info = TIPO_OPTIONS[valor];
      const bgEl = document.getElementById(`preview-tipo-bg-${index}`);
      const iconEl = document.getElementById(`preview-tipo-icon-${index}`);
      const textEl = document.getElementById(`preview-tipo-text-${index}`);

      if (bgEl && iconEl && textEl) {
          // Limpiar clases antiguas
          bgEl.className = `p-1 rounded ${info.bg} ${info.color}`;
          iconEl.setAttribute('icon', info.icon);
          textEl.innerText = info.label;
      }
  } 
  else if (campo === 'estado') {
      const info = ESTADO_OPTIONS[valor];
      const btnEl = document.getElementById(`btn-estado-main-${index}`);
      const textEl = document.getElementById(`preview-estado-text-${index}`);

      if (btnEl && textEl) {
          // Reemplazar clases base
          btnEl.className = `w-full text-xs font-bold px-3 py-1.5 rounded-full border shadow-sm transition-all flex items-center justify-center gap-1 whitespace-nowrap ${info.bg} ${info.color} ${info.border} hover:opacity-90 active:scale-95`;
          textEl.innerText = info.label;
      }
  }

  // 3. Cerrar Dropdown
  const dropdown = document.getElementById(`dropdown-${campo}-${index}`);
  const container = document.getElementById(`container-${campo}-${index}`);
  if (dropdown) dropdown.classList.add('hidden');
  if (container) container.classList.remove('z-50');

  // 4. Verificar Cambios
  checkRecursosChanges();
}

// C. Edición de Inputs (Texto y Números)
function editarRecursoInput(inputEl, index, campo) {
  let valor = inputEl.value;
  
  // Forzar tipo numérico si es capacidad
  if (campo === 'capacidad') {
      valor = parseInt(valor, 10);
      if (isNaN(valor)) valor = 1; // Fallback
  }
  
  AdminState.recursos[index][campo] = valor;
  
  // Legacy support
  if(campo === 'nombre') AdminState.recursos[index].nombre_recurso = valor;

  // Validación visual simple
  if (campo === 'nombre') {
      if (!valor) inputEl.classList.add('border-red-300', 'bg-red-50', 'placeholder-red-400');
      else inputEl.classList.remove('border-red-300', 'bg-red-50', 'placeholder-red-400');
  }

  checkRecursosChanges();
}

// --- 5. GESTIÓN DE CAMBIOS (COMPARACIÓN PROFUNDA) ---

function checkRecursosChanges() {
  if (!AdminState.recursosOriginales) return;
  
  // Limpiamos los datos antes de comparar para evitar falsos positivos
  // (A veces se cuelan propiedades extrañas en los objetos durante la ejecución)
  const limpiar = (arr) => arr.map(r => ({
      id: r.id_recurso,
      nom: r.nombre,
      tip: r.tipo,
      cap: parseInt(r.capacidad), // Aseguramos comparación numérica
      est: r.estado,
      ubi: r.ubicacion || '',
      ico: r.icono || 'mdi:cube-outline'

  }));

  const actualStr = JSON.stringify(limpiar(AdminState.recursos));
  const originalStr = JSON.stringify(limpiar(AdminState.recursosOriginales));
  
  AdminState.cambiosPendientes = (actualStr !== originalStr);
  
  if (AdminState.cambiosPendientes) {
    SaveBarManager.show("Recursos modificados", guardarCambiosRecursos, descartarCambiosRecursos);
  } else {
    SaveBarManager.hide();
  }
}

function guardarCambiosRecursos() {
  const invalidos = AdminState.recursos.filter(r => !r.nombre || r.nombre.trim() === '');
  if (invalidos.length > 0) {
      showToast('warning', `Falta el nombre en ${invalidos.length} recurso(s).`);
      return;
  }

  showLoading();
  google.script.run
    .withSuccessHandler(res => {
      hideLoading();
      if (res.success) {
        showToast('success', 'Recursos guardados');
        AdminState.recursosOriginales = JSON.parse(JSON.stringify(AdminState.recursos));
        AdminState.cambiosPendientes = false;
        SaveBarManager.hide();
        renderTablaRecursos();

        // ✅ SINCRONIZAR con globalState (para la vista de usuario)
        if (typeof globalState !== 'undefined') {
          globalState.recursos = JSON.parse(JSON.stringify(AdminState.recursos));
        }

        adminHaCambiadoDatos = true;
        if (typeof window.recargarDatosApp === 'function') {
          window.recargarDatosApp();
        }
      } else {
        showToast('error', res.error);
      }
    })
    .withFailureHandler(err => { hideLoading(); showToast('error', err); })
    .saveBatchRecursos(AdminState.recursos);
}

function descartarCambiosRecursos() {
  mostrarConfirmacion('¿Descartar cambios?', 'Volverás al estado original.', () => {
      AdminState.recursos = JSON.parse(JSON.stringify(AdminState.recursosOriginales));
      AdminState.cambiosPendientes = false;
      renderTablaRecursos();
      SaveBarManager.hide();
      showToast('info', 'Cambios descartados');
  });
}

function toggleRecursoDropdown(e) {

// 2. LÓGICA DE DATOS (MATRIZ UNIFICADA)
async function cargarMatrizDisponibilidad(idRecurso) {
  if (!idRecurso) return;

  DispState.recursoId = idRecurso;

  // Mostrar spinner de carga sobre la matriz
  const spinner = document.getElementById('spinnerMatrizUnificada');
  if (spinner) spinner.classList.remove('hidden');

  // Mostrar leyenda
  const leyenda = document.getElementById('leyendaDisp');
  if (leyenda) leyenda.classList.remove('hidden');

  try {
    // Llamar al backend para obtener datos combinados
    const result = await new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)
        .getDatosMatrizUnificada(idRecurso);
    });

    if (spinner) spinner.classList.add('hidden');

    if (!result || !result.success) {
      showToast('error', result?.error || 'Error al cargar datos');
      return;
    }

    // Procesar disponibilidad
    const datosNormalizados = (result.disponibilidad || []).map(d => ({
      id_tramo: String(d.id_tramo).trim(),
      dia_semana: String(d.dia_semana).trim(),
      permitido: d.permitido || 'Si',
      razon_bloqueo: d.razon_bloqueo || ''
    }));

    DispState.datosOriginales = JSON.parse(JSON.stringify(datosNormalizados));
    DispState.datosActuales = JSON.parse(JSON.stringify(datosNormalizados));

    // Procesar recurrencias aprobadas
    DispState.recurrencias = result.recurrencias || [];
    DispState.mapaRecurrencias = construirMapaRecurrencias(DispState.recurrencias);

    // Procesar pendientes del recurso
    DispState.pendientes = result.solicitudesPendientes || [];
    actualizarPanelPendientesRecurso();

    renderMatrizHTML();
    checkDispChanges();

  } catch (error) {
    if (spinner) spinner.classList.add('hidden');
    console.error('Error cargando matriz unificada:', error);
    showToast('error', 'Error al cargar: ' + (error.message || String(error)));
  }
}

/**
 * Construye un mapa de recurrencias por celda (dia:tramo) para búsqueda rápida
 */
function construirMapaRecurrencias(recurrencias) {
  const mapa = new Map();
  const diasMap = { 'L': 'Lunes', 'M': 'Martes', 'X': 'Miércoles', 'J': 'Jueves', 'V': 'Viernes', 'S': 'Sábado', 'D': 'Domingo' };

  recurrencias.forEach(rec => {
    const diasStr = rec.dias_semana || '';

    if (diasStr.includes(':')) {
      // Formato nuevo: "L:T001,M:T002"
      diasStr.split(',').forEach(item => {
        const [diaCorto, idTramo] = item.trim().split(':');
        if (diaCorto && idTramo) {
          const diaLargo = diasMap[diaCorto.toUpperCase()] || diaCorto;
          const key = `${idTramo.trim()}-${diaLargo}`;
          if (!mapa.has(key)) mapa.set(key, []);
          mapa.get(key).push(rec);
        }
      });
    } else {
      // Formato antiguo: "L,M,X" con un solo id_tramo
      const idTramo = rec.id_tramo;
      if (idTramo) {
        diasStr.split(',').forEach(diaCorto => {
          const diaLargo = diasMap[diaCorto.trim().toUpperCase()] || diaCorto.trim();
          const key = `${idTramo}-${diaLargo}`;
          if (!mapa.has(key)) mapa.set(key, []);
          mapa.get(key).push(rec);
        });
      }
    }
  });

  return mapa;
}

/**
 * Actualiza el panel de solicitudes pendientes del recurso
 */
function actualizarPanelPendientesRecurso() {
  const panel = document.getElementById('panelPendientesRecurso');
  const badge = document.getElementById('badgePendientesRecurso');
  const lista = document.getElementById('listaPendientesRecurso');

  if (!panel || !badge || !lista) return;

  const pendientes = DispState.pendientes || [];

  if (pendientes.length === 0) {
    panel.classList.add('hidden');
    return;
  }

  panel.classList.remove('hidden');
  badge.textContent = pendientes.length;

  // Helper para obtener nombre de tramo
  const getNombreTramo = (idTramo) => {
    const tramo = AdminState.tramos?.find(t => t.id_tramo === idTramo);
    return tramo?.Nombre_Tramo || tramo?.nombre_tramo || idTramo;
  };

  // Obtener nombre del recurso actual
  const recursoActual = AdminState.recursos?.find(r => r.id_recurso === DispState.recursoId);
  const nombreRecursoActual = recursoActual?.nombre || '';

  // Botón "Aprobar todas" dentro del contenido expandido si hay más de 1
  let htmlContent = pendientes.length > 1 ? `
    <div class="px-3 py-2 bg-amber-100/50 border-b border-amber-200 flex justify-end">
      <button onclick="aprobarTodasPendientesRecurso()"
        class="px-3 py-1.5 bg-green-600 hover:bg-green-700 text-white text-xs font-medium rounded-lg flex items-center gap-1.5 transition-colors">
        <iconify-icon icon="mdi:check-all" class="text-sm"></iconify-icon>
        Aprobar todas
      </button>
    </div>
  ` : '';

  htmlContent += pendientes.map((sol, idx) => {
    // Enriquecer con nombre de recurso si no lo tiene
    if (!sol.nombre_recurso && nombreRecursoActual) {
      sol.nombre_recurso = nombreRecursoActual;
    }

    const diasStr = sol.dias_semana || '';
    let diasDisplay = '';
    let tramosDisplay = '';

    if (diasStr.includes(':')) {
      const diasSet = new Set();
      const tramosSet = new Set();
      diasStr.split(',').forEach(item => {
        const [d, t] = item.trim().split(':');
        if (d) diasSet.add(d.toUpperCase());
        if (t) tramosSet.add(t);
      });
      diasDisplay = Array.from(diasSet).join('·');
      tramosDisplay = Array.from(tramosSet).map(getNombreTramo).join(', ');
    } else {
      diasDisplay = diasStr.split(',').map(d => d.trim().toUpperCase()).join('·');
      tramosDisplay = sol.nombre_tramo || getNombreTramo(sol.id_tramo);
    }

    return `
      <div id="pendiente-row-${sol.id_solicitud}" class="px-3 py-2.5 flex items-center justify-between gap-2 border-b border-amber-100 last:border-b-0 hover:bg-amber-100/30 transition-colors">
        <div class="flex-1 min-w-0">
          <div class="text-sm font-medium text-gray-800 truncate">${escaparHTML(sol.nombre_usuario)}</div>
          <div class="text-xs text-gray-500">${diasDisplay} | ${escaparHTML(tramosDisplay)}</div>
        </div>
        <div class="flex gap-1 shrink-0">
          <button id="btn-aprobar-${sol.id_solicitud}" onclick="aprobarSolicitudRapidaConSpinner('${sol.id_solicitud}', this)"
            class="p-1.5 bg-green-100 hover:bg-green-200 text-green-700 rounded-lg transition-colors" title="Aprobar">
            <iconify-icon icon="mdi:check" class="text-base"></iconify-icon>
          </button>
          <button onclick="rechazarSolicitudRapida('${sol.id_solicitud}')"
            class="p-1.5 bg-red-100 hover:bg-red-200 text-red-700 rounded-lg transition-colors" title="Rechazar">
            <iconify-icon icon="mdi:close" class="text-base"></iconify-icon>
          </button>
          <button onclick="verDetalleSolicitudDirecto('${sol.id_solicitud}')"
            class="p-1.5 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-lg transition-colors" title="Ver detalles">
            <iconify-icon icon="mdi:eye-outline" class="text-base"></iconify-icon>
          </button>
        </div>
      </div>
    `;
  }).join('');

  lista.innerHTML = htmlContent;
}

/**
 * Ver detalles de solicitud directamente desde los datos locales
 */
function verDetalleSolicitudDirecto(idSolicitud) {
  // Buscar en múltiples fuentes de datos
  let sol = DispState.pendientes?.find(s => s.id_solicitud === idSolicitud);

  if (!sol) {
    sol = AdminState.solicitudesRecurrentes?.find(s => s.id_solicitud === idSolicitud);
  }

  if (!sol) {
    sol = DispState.recurrencias?.find(s => s.id_solicitud === idSolicitud);
  }

  if (sol) {
    abrirModalGestionarSolicitud(idSolicitud);
  } else {
    showToast('error', 'Solicitud no encontrada');
  }
}

/**
 * Aprobar solicitud con spinner visual
 */
async function aprobarSolicitudRapidaConSpinner(idSolicitud, btnElement) {
  if (!idSolicitud) return;

  // Mostrar spinner en el botón
  const originalContent = btnElement.innerHTML;
  btnElement.innerHTML = '<iconify-icon icon="mdi:loading" class="text-base animate-spin"></iconify-icon>';
  btnElement.disabled = true;

  try {
    const result = await new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)
        .aprobarSolicitudRecurrente(idSolicitud, '');
    });

    if (result && result.success) {
      showToast('success', 'Solicitud aprobada');
      // Eliminar la fila visualmente
      const row = document.getElementById(`pendiente-row-${idSolicitud}`);
      if (row) row.remove();
      // Actualizar badge
      const badge = document.getElementById('badgePendientesRecurso');
      const count = parseInt(badge?.textContent || '1') - 1;
      if (badge) badge.textContent = count;
      if (count === 0) {
        document.getElementById('panelPendientesRecurso')?.classList.add('hidden');
      }
      // Recargar matriz
      if (DispState.recursoId) cargarMatrizDisponibilidad(DispState.recursoId);
    } else {
      btnElement.innerHTML = originalContent;
      btnElement.disabled = false;
      showToast('error', result?.error || 'Error al aprobar');
    }
  } catch (error) {
    btnElement.innerHTML = originalContent;
    btnElement.disabled = false;
    showToast('error', 'Error: ' + (error.message || String(error)));
  }
}

/**
 * Rechazar solicitud rápida con spinner visual
 */
function rechazarSolicitudRapidaConSpinner(idSolicitud, btnElement) {
  if (!idSolicitud) return;

  // Mostrar spinner breve para feedback visual
  const originalContent = btnElement.innerHTML;
  btnElement.innerHTML = '<iconify-icon icon="mdi:loading" class="text-sm animate-spin"></iconify-icon>';
  btnElement.disabled = true;

  // Abrir el modal de gestión para que el admin escriba el motivo
  setTimeout(() => {
    btnElement.innerHTML = originalContent;
    btnElement.disabled = false;
    abrirModalGestionarSolicitud(idSolicitud);
  }, 200);
}

/**
 * Aprobar todas las pendientes del recurso actual
 */
async function aprobarTodasPendientesRecurso() {
  const pendientes = DispState.pendientes || [];
  if (pendientes.length === 0) return;

  if (!confirm(`¿Aprobar las ${pendientes.length} solicitudes pendientes?`)) return;

  let aprobadas = 0;
  let errores = 0;
  let todasLasReservasNuevas = [];

  for (const sol of pendientes) {
    try {
      const result = await new Promise((resolve, reject) => {
        google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(reject)
          .aprobarSolicitudRecurrente(sol.id_solicitud, '');
      });
      if (result && result.success) {
        aprobadas++;
        if (result.reservas) todasLasReservasNuevas = todasLasReservasNuevas.concat(result.reservas);
      } else {
        errores++;
      }
    } catch (e) {
      errores++;
    }
  }

  if (aprobadas > 0) {
    showToast('success', `${aprobadas} solicitud(es) aprobada(s)`);
  }
  if (errores > 0) {
    showToast('error', `${errores} error(es) al aprobar`);
  }

  // Recargar la matriz
  if (DispState.recursoId) {
    cargarMatrizDisponibilidad(DispState.recursoId);
  }
  // Inyectar reservas nuevas en AdminState y globalState
  if (todasLasReservasNuevas.length > 0) {
    AdminState.reservas = AdminState.reservas.concat(todasLasReservasNuevas);
    if (typeof renderTablaReservas === 'function') renderTablaReservas();
    if (typeof globalState !== 'undefined') {
      const nuevasParaGlobal = todasLasReservasNuevas.map(r => ({
        id_reserva: r.ID_Reserva,
        id_recurso: r.ID_Recurso,
        email_usuario: r.Email_Usuario,
        fecha: r.Fecha,
        id_tramo: r.ID_Tramo,
        cantidad: r.Cantidad,
        estado: r.Estado,
        notas: r.Notas,
        id_solicitud_recurrente: r.ID_Solicitud_Recurrente
      }));
      globalState.reservas = globalState.reservas.concat(nuevasParaGlobal);
    }
  }
}

// 3. RENDERIZADO DE LA MATRIZ (CON SCROLL PRESERVATION 🛡️)
function renderMatrizHTML() {
  const tbody = document.getElementById('cuerpoMatriz');
  if (!tbody) return;
  
  // ✅ Scroll Preservation
  const scrollContainer = tbody.closest('.overflow-auto') || tbody.parentElement;
  const scrollPos = scrollContainer ? scrollContainer.scrollTop : 0;
  
  tbody.innerHTML = '';
  
  if (!DispState.tramosCache) {
      DispState.tramosCache = [...AdminState.tramos].sort((a,b) => (a.hora_inicio||'').localeCompare(b.hora_inicio||''));
  }
  const tramos = DispState.tramosCache;

  const mapaDatos = new Map();
  DispState.datosActuales.forEach(d => {
      mapaDatos.set(`${d.id_tramo}-${d.dia_semana}`, d);
  });

  const fragment = document.createDocumentFragment();

  tramos.forEach((tramo, index) => {
    const tr = document.createElement('tr');
    tr.className = "hover:bg-gray-50/50 transition-colors";
    
    tr.innerHTML = `
      <td class="px-4 py-3 border-r border-gray-200 bg-gray-50 sticky left-0 z-20 w-32 min-w-[120px] shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)]">
        <div class="text-xs font-bold text-gray-700">${tramo.Nombre_Tramo || tramo.nombre}</div>
        <div class="text-[10px] text-gray-400 font-mono mt-0.5 flex items-center gap-1">
            <iconify-icon icon="mdi:clock-time-four-outline"></iconify-icon>
            ${tramo.hora_inicio} - ${tramo.hora_fin}
        </div>
      </td>
    `;

    const esPrimeraFila = (index === 0);

    DIAS.forEach(dia => {
      const dato = mapaDatos.get(`${tramo.id_tramo}-${dia}`);
      const td = document.createElement('td');
      td.id = `td-${tramo.id_tramo}-${dia}`; // ID Único
      
      const configVisual = getConfigVisualCelda(dato, tramo.id_tramo, dia, esPrimeraFila);
      td.className = configVisual.className;
      td.innerHTML = configVisual.innerHTML;
      
      td.onclick = (e) => {
        if(e.target.closest('.btn-info')) return; 
        toggleCelda(tramo.id_tramo, dia, esPrimeraFila);
      };

      tr.appendChild(td);
    });
    fragment.appendChild(tr);
  });
  
  tbody.appendChild(fragment);
  
  // ✅ Restaurar Scroll
  if (scrollContainer) {
    requestAnimationFrame(() => {
      scrollContainer.scrollTop = scrollPos;
    });
  }
}

// ✅ HELPER VISUAL (MATRIZ UNIFICADA - 3 ESTADOS)
function getConfigVisualCelda(dato, idTramo, dia, esPrimeraFila) {
    const esBloqueado = dato && dato.permitido === 'No';
    const razon = dato ? (dato.razon_bloqueo || '') : '';

    // Buscar recurrencias en esta celda
    const key = `${idTramo}-${dia}`;
    const recurrencias = DispState.mapaRecurrencias?.get(key) || [];
    const tieneRecurrencia = recurrencias.length > 0;

    // Determinar clase de fondo según estado
    let bgClass = "bg-white hover:bg-green-50"; // Disponible
    if (esBloqueado) {
      bgClass = "bg-red-50 hover:bg-red-100"; // Bloqueado
    } else if (tieneRecurrencia) {
      bgClass = "bg-blue-50 hover:bg-blue-100"; // Recurrencia
    }

    const className = `p-1 border border-gray-100 h-16 text-center transition-all duration-200 relative group min-w-[110px] cursor-pointer ${bgClass}`;

    const tooltipPos = esPrimeraFila ? 'top-full mt-2' : 'bottom-full mb-2';
    const arrowBorder = esPrimeraFila ? 'border-l-transparent border-r-transparent border-b-gray-800' : 'border-l-transparent border-r-transparent border-t-gray-800';
    const arrowPosClass = esPrimeraFila ? 'bottom-full' : 'top-full';

    let innerHTML = '';

    if (esBloqueado) {
        // ESTADO: BLOQUEADO (Rojo)
        const tooltipHTML = razon ? `
            <div class="absolute ${tooltipPos} left-1/2 -translate-x-1/2 px-3 py-2 bg-gray-800 text-white text-[11px] font-medium rounded-lg shadow-xl opacity-0 group-hover/btn:opacity-100 transition-all duration-200 pointer-events-none whitespace-normal w-48 text-center z-[100]">
                ${escaparHTML(razon)}
                <div class="absolute left-1/2 -translate-x-1/2 border-4 ${arrowBorder} ${arrowPosClass}"></div>
            </div>

// 4. INTERACCIÓN (ACTUALIZACIÓN QUIRÚRGICA 💉)
function toggleCelda(idTramo, dia, esPrimeraFila = false) {
  idTramo = String(idTramo);

  // Verificar si hay recurrencia en esta celda (no permitir toggle directo)
  const key = `${idTramo}-${dia}`;
  const recurrencias = DispState.mapaRecurrencias?.get(key) || [];
  if (recurrencias.length > 0) {
    // Si hay recurrencia, abrir menú contextual en lugar de toggle
    abrirMenuRecurrencia(idTramo, dia);
    return;
  }

  let index = DispState.datosActuales.findIndex(d =>
    d.id_tramo === idTramo && d.dia_semana === dia
  );

  let datoActualizado = null;

  if (index === -1) {
    // Si no existe, creamos bloqueo
    datoActualizado = { id_tramo: idTramo, dia_semana: dia, permitido: 'No', razon_bloqueo: '' };
    DispState.datosActuales.push(datoActualizado);
  } else {
    // Si existe, lo modificamos (PERO NO LO BORRAMOS)
    const actual = DispState.datosActuales[index];

    if (actual.permitido === 'No') {
        // Desbloquear
        actual.permitido = 'Si';
        datoActualizado = actual;
    } else {
        // Bloquear
        actual.permitido = 'No';
        datoActualizado = actual;
    }
  }

  actualizarCeldaVisualmente(idTramo, dia, datoActualizado, esPrimeraFila);
  checkDispChanges();
}

/**
 * Abre el menú contextual para gestionar una recurrencia
 */
function abrirMenuRecurrencia(idTramo, dia) {
  const key = `${idTramo}-${dia}`;
  const recurrencias = DispState.mapaRecurrencias?.get(key) || [];

  if (recurrencias.length === 0) return;

  const rec = recurrencias[0];

  if (!rec.id_solicitud) return;

  // Diferenciar por estado
  const estado = (rec.estado || '').toLowerCase();

  if (estado === 'aprobada') {
    // Abrir modal de detalle/gestión de recurrencia aprobada
    abrirModalDetalleRecurrencia(rec);
  } else if (estado === 'pendiente') {
    // Abrir modal de aprobar/rechazar
    abrirModalGestionarSolicitud(rec.id_solicitud);
  } else {
    // Cualquier otro estado, mostrar detalles
    abrirModalDetalleRecurrencia(rec);
  }
}

/**
 * Abre el modal de detalle para recurrencias aprobadas
 */
function abrirModalDetalleRecurrencia(rec) {
  const diasNombres = { 'L': 'Lunes', 'M': 'Martes', 'X': 'Miércoles', 'J': 'Jueves', 'V': 'Viernes', 'S': 'Sábado', 'D': 'Domingo' };
  const diasStr = rec.dias_semana || '';

  const getNombreTramo = (idTramo) => {
    const tramo = AdminState.tramos?.find(t => t.id_tramo === idTramo);
    return tramo?.Nombre_Tramo || tramo?.nombre_tramo || idTramo;
  };

  // Parsear pares día:tramo
  let paresDiaTramo = [];
  if (diasStr.includes(':')) {
    diasStr.split(',').forEach(item => {
      const [dia, tramo] = item.trim().split(':');
      if (dia && tramo) {
        paresDiaTramo.push({ dia: dia.toUpperCase(), tramo: tramo });
      }
    });
  } else {
    const tramoId = rec.id_tramo || '';
    diasStr.split(',').forEach(d => {
      const dd = d.trim().toUpperCase();
      if (dd) paresDiaTramo.push({ dia: dd, tramo: tramoId });
    });
  }

  const tieneMultiplesTramos = paresDiaTramo.length > 1;

  // Construir HTML de la lista de tramos
  let tramosListHTML = '';
  if (tieneMultiplesTramos) {
    const tramosItems = paresDiaTramo.map(p => {
      const diaNombre = diasNombres[p.dia] || p.dia;
      const tramoNombre = getNombreTramo(p.tramo);
      return `
        <div class="flex items-center justify-between py-1.5 px-2 rounded-lg hover:bg-gray-100 group transition-colors">
          <span class="text-sm text-gray-700">

          </span>

            title="Eliminar este tramo">
            <iconify-icon icon="mdi:close-circle-outline" class="text-lg"></iconify-icon>
          </button>
        </div>`;
    }).join('');
    tramosListHTML = `
      <div>
        <p class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Tramos reservados</p>
        <div class="divide-y divide-gray-100">${tramosItems}</div>
      </div>`;
  } else {
    // Solo un tramo: mostrar como antes sin botón de eliminar
    const diasFormateados = paresDiaTramo.map(p => diasNombres[p.dia] || p.dia).join(', ');
    const tramosFormateados = [...new Set(paresDiaTramo.map(p => getNombreTramo(p.tramo)))].join(', ');
    tramosListHTML = `
      <p><span class="font-medium text-gray-700">Días:</span> ${escaparHTML(diasFormateados)}</p>
      <p><span class="font-medium text-gray-700">Tramos:</span> ${escaparHTML(tramosFormateados)}</p>`;
  }

  // Obtener nombre del recurso
  const recurso = AdminState.recursos?.find(r => r.id_recurso === rec.id_recurso || r.id_recurso === DispState.recursoId);
  const nombreRecurso = rec.nombre_recurso || recurso?.nombre || '';

  const fechaInicio = rec.fecha_inicio ? new Date(rec.fecha_inicio).toLocaleDateString('es-ES') : '-';
  const fechaFin = rec.fecha_fin ? new Date(rec.fecha_fin).toLocaleDateString('es-ES') : '-';

  const modalHTML = `
    <div id="modalDetalleRecurrencia" class="fixed inset-0 z-[10100] flex items-center justify-center p-4">
      <div class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm" onclick="cerrarModalDetalleRecurrencia()"></div>
      <div class="relative bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden animate-fade-in-up">
        <!-- Header -->
        <div class="bg-blue-50 px-6 py-4 flex items-center justify-between border-b border-blue-100">
          <div class="flex items-center gap-3">
            <div class="flex h-10 w-10 items-center justify-center rounded-full bg-blue-100">
              <iconify-icon icon="mdi:calendar-account" class="text-xl text-blue-600"></iconify-icon>
            </div>
            <div>
              <h3 class="text-lg font-semibold text-gray-900">Recurrencia Activa</h3>
              <p class="text-sm text-blue-600">${escaparHTML(nombreRecurso)}</p>
            </div>
          </div>
          <button onclick="cerrarModalDetalleRecurrencia()" class="p-2 hover:bg-blue-100 rounded-full transition-colors">
            <iconify-icon icon="mdi:close" class="text-xl text-gray-500"></iconify-icon>
          </button>
        </div>

        <!-- Contenido -->
        <div class="px-6 py-5 space-y-4">
          <div class="bg-gray-50 rounded-xl p-4 space-y-2 text-sm">
            <p><span class="font-medium text-gray-700">Usuario:</span> ${escaparHTML(rec.nombre_usuario)}</p>
            <p><span class="font-medium text-gray-700">Email:</span> ${escaparHTML(rec.email_usuario)}</p>
            ${rec.area_usuario ? `<p><span class="font-medium text-gray-700">Área:</span> ${escaparHTML(rec.area_usuario)}</p>` : ''}
            ${tramosListHTML}
            <p><span class="font-medium text-gray-700">Período:</span> ${fechaInicio} → ${fechaFin}</p>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2 flex items-center gap-1">
              <iconify-icon icon="mdi:text-box-edit-outline" class="text-base"></iconify-icon>

            <span id="textoGuardarMotivo">Guardar</span>
          </button>
          <button id="btnRevocarRecurrencia" onclick="confirmarRevocarRecurrencia('${rec.id_solicitud}')"
            class="px-4 py-2.5 bg-red-100 hover:bg-red-200 text-red-700 rounded-xl text-sm font-medium transition-colors flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
            <iconify-icon id="iconRevocarRecurrencia" icon="mdi:cancel"></iconify-icon>
            <span id="textoRevocarRecurrencia">Revocar</span>
          </button>
        </div>
      </div>
    </div>
  `;

  // Eliminar modal anterior si existe
  const modalExistente = document.getElementById('modalDetalleRecurrencia');
  if (modalExistente) modalExistente.remove();

  // Insertar y mostrar
  document.body.insertAdjacentHTML('beforeend', modalHTML);

/**
 * Confirma y elimina un tramo individual de una recurrencia
 */
function confirmarEliminarTramoRecurrencia(idSolicitud, diaLetra, idTramo, btnEl) {
  const diasNombres = { 'L': 'Lunes', 'M': 'Martes', 'X': 'Miércoles', 'J': 'Jueves', 'V': 'Viernes', 'S': 'Sábado', 'D': 'Domingo' };
  const getNombreTramo = (id) => {
    const t = AdminState.tramos?.find(t => t.id_tramo === id);
    return t?.Nombre_Tramo || t?.nombre_tramo || id;
  };
  const diaNombre = diasNombres[diaLetra] || diaLetra;
  const tramoNombre = getNombreTramo(idTramo);

  mostrarConfirmacion(
    'Eliminar tramo',
    `¿Eliminar el tramo ${diaNombre} — ${tramoNombre} de esta recurrencia? Se eliminarán las reservas futuras de ese tramo.`,
    () => eliminarTramoRecurrencia(idSolicitud, diaLetra, idTramo)
  );
}

async function eliminarTramoRecurrencia(idSolicitud, diaLetra, idTramo) {
  // Deshabilitar todos los botones del modal y mostrar overlay de carga
  const modal = document.getElementById('modalDetalleRecurrencia');
  const botones = modal?.querySelectorAll('button') || [];
  botones.forEach(b => b.disabled = true);

  // Añadir overlay spinner al modal
  const contenedor = modal?.querySelector('.relative');
  if (contenedor) {
    contenedor.insertAdjacentHTML('beforeend', `
      <div id="overlayEliminandoTramo" class="absolute inset-0 bg-white/70 flex items-center justify-center z-10 rounded-2xl">
        <div class="flex items-center gap-3 text-blue-600">
          <iconify-icon icon="mdi:loading" class="text-2xl animate-spin"></iconify-icon>
          <span class="text-sm font-medium">Eliminando tramo...</span>
        </div>
      </div>
    `);
  }

  try {
    const result = await new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)
        .eliminarTramoDeRecurrencia(idSolicitud, diaLetra, idTramo);
    });

    if (result && result.success) {
      showToast('success', result.message);
      cerrarModalDetalleRecurrencia();
      // Recargar la matriz de disponibilidad
      if (DispState.recursoId) {
        cargarMatrizDisponibilidad(DispState.recursoId);
      }
      // Recargar la lista de recurrentes
      cargarSolicitudesRecurrentes();
    } else {
      // Quitar overlay y rehabilitar botones en caso de error
      document.getElementById('overlayEliminandoTramo')?.remove();
      botones.forEach(b => b.disabled = false);
      showToast('error', result?.error || 'Error al eliminar tramo');
    }
  } catch (error) {
    document.getElementById('overlayEliminandoTramo')?.remove();
    botones.forEach(b => b.disabled = false);
    console.error('Error eliminando tramo:', error);
    showToast('error', 'Error: ' + (error.message || String(error)));
  }
}

async function revocarRecurrencia(idSolicitud) {
  const btn = document.getElementById('btnRevocarRecurrencia');
  const icon = document.getElementById('iconRevocarRecurrencia');
  const texto = document.getElementById('textoRevocarRecurrencia');

  // Mostrar spinner
  if (btn) btn.disabled = true;
  if (icon) { icon.setAttribute('icon', 'mdi:loading'); icon.classList.add('animate-spin'); }
  if (texto) texto.textContent = 'Revocando...';

  try {
    const result = await new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)
        .cancelarRecurrenciaAprobada(idSolicitud);
    });

    if (result && result.success) {
      showToast('success', 'Recurrencia revocada');
      cerrarModalDetalleRecurrencia();
      // Recargar matriz
      if (DispState.recursoId) cargarMatrizDisponibilidad(DispState.recursoId);
      // Actualizar historial: marcar como cancelada y re-renderizar
      const idx = datosHistorialRecurrencias.findIndex(s => s.id_solicitud === idSolicitud);
      if (idx !== -1) {
        datosHistorialRecurrencias[idx].estado = 'Cancelada';
        renderizarHistorialRecurrencias();
      }
      // Actualizar estado global del usuario (para que no haga falta recargar)
      if (typeof globalState !== 'undefined') {
        globalState.reservas = globalState.reservas.filter(
          r => r.id_solicitud_recurrente !== idSolicitud
        );
        globalState.misReservasActivas = globalState.misReservasActivas.filter(
          r => r.id_solicitud_recurrente !== idSolicitud
        );
      }
      // Actualizar reservas en AdminState y re-renderizar tabla
      AdminState.reservas = AdminState.reservas.filter(
        r => r.id_solicitud_recurrente !== idSolicitud
      );
      if (typeof renderTablaReservas === 'function') renderTablaReservas();
    } else {
      showToast('error', result?.error || 'Error al revocar');
      // Restaurar boton
      if (btn) btn.disabled = false;
      if (icon) { icon.setAttribute('icon', 'mdi:cancel'); icon.classList.remove('animate-spin'); }
      if (texto) texto.textContent = 'Revocar';
    }
  } catch (error) {
    showToast('error', 'Error: ' + (error.message || String(error)));
    // Restaurar boton
    if (btn) btn.disabled = false;
    if (icon) { icon.setAttribute('icon', 'mdi:cancel'); icon.classList.remove('animate-spin'); }
    if (texto) texto.textContent = 'Revocar';
  }
}

/**
 * Aprueba una solicitud rápidamente desde el panel de pendientes
 */
async function aprobarSolicitudRapida(idSolicitud) {
  if (!idSolicitud) return;

  try {
    const result = await new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)
        .aprobarSolicitudRecurrente(idSolicitud, '');
    });

    if (result && result.success) {
      showToast('success', 'Solicitud aprobada correctamente');
      // Recargar la matriz
      if (DispState.recursoId) {
        cargarMatrizDisponibilidad(DispState.recursoId);
      }
      // También actualizar la lista global de recurrentes
      cargarSolicitudesRecurrentes();
      // Inyectar reservas nuevas en AdminState y globalState
      if (result.reservas && result.reservas.length > 0) {
        AdminState.reservas = AdminState.reservas.concat(result.reservas);
        if (typeof renderTablaReservas === 'function') renderTablaReservas();
        if (typeof globalState !== 'undefined') {
          const nuevasParaGlobal = result.reservas.map(r => ({
            id_reserva: r.ID_Reserva,
            id_recurso: r.ID_Recurso,
            email_usuario: r.Email_Usuario,
            fecha: r.Fecha,
            id_tramo: r.ID_Tramo,
            cantidad: r.Cantidad,
            estado: r.Estado,
            notas: r.Notas,
            id_solicitud_recurrente: r.ID_Solicitud_Recurrente
          }));
          globalState.reservas = globalState.reservas.concat(nuevasParaGlobal);
        }
      }
    } else {
      showToast('error', result?.error || 'Error al aprobar');
    }
  } catch (error) {
    console.error('Error aprobando solicitud:', error);
    showToast('error', 'Error: ' + (error.message || String(error)));
  }
}

/**
 * Rechaza una solicitud rápidamente (abre modal para motivo)
 */
function rechazarSolicitudRapida(idSolicitud) {
  if (!idSolicitud) return;
  // Abrir el modal de gestión para que el admin escriba el motivo
  abrirModalGestionarSolicitud(idSolicitud);
}

function actualizarCeldaVisualmente(idTramo, dia, dato, esPrimeraFila) {
    const tdId = `td-${idTramo}-${dia}`;
    const td = document.getElementById(tdId);
    
    if (!td) {
        console.warn(`Celda ${tdId} no encontrada, forzando repintado completo.`);
        renderMatrizHTML();
        return;
    }
    
    if (esPrimeraFila === undefined) {
        const tr = td.parentElement;
        const tbody = tr.parentElement;
        esPrimeraFila = (Array.from(tbody.children).indexOf(tr) === 0);
    }

    const config = getConfigVisualCelda(dato, idTramo, dia, esPrimeraFila);
    td.className = config.className;
    td.innerHTML = config.innerHTML;
}


// 5. GESTIÓN DE CAMBIOS Y GUARDADO
const getDispKey = (arr) => arr.map(d => `${d.id_tramo}|${d.dia_semana}|${d.permitido}|${d.razon_bloqueo}`).sort();

function checkDispChanges() {
  const normalize = (list) => {
    return list
      .filter(d => {
          const tieneNota = d.razon_bloqueo && d.razon_bloqueo.trim().length > 0;
          return d.permitido === 'No' || tieneNota;
      })
      .map(d => `${d.id_tramo}|${d.dia_semana}|${d.permitido}|${(d.razon_bloqueo || '').trim()}`)
      .sort();
  };

  const originalStr = JSON.stringify(normalize(DispState.datosOriginales));
  const actualStr = JSON.stringify(normalize(DispState.datosActuales));
  
  const hayCambios = (originalStr !== actualStr);
  DispState.cambiosPendientes = hayCambios;
  
  if (hayCambios) {
    SaveBarManager.show("Horarios modificados", guardarCambiosDisp, descartarCambiosDisp);
  } else {
    SaveBarManager.hide();
  }
}

// Variable para almacenar payload pendiente de confirmación
let payloadDisponibilidadPendiente = null;

function guardarCambiosDisp(forzar = false) {
  if (!DispState.recursoId) {
      showToast('error', 'Error: No hay recurso seleccionado');
      return;
  }

  showLoading();

  const payload = DispState.datosActuales.map(d => ({
    id_recurso: DispState.recursoId,
    id_tramo: d.id_tramo,
    dia_semana: d.dia_semana,
    permitido: d.permitido,
    razon_bloqueo: d.razon_bloqueo
  }));

  google.script.run
    .withSuccessHandler(res => {
      hideLoading();

      if (res.requiereConfirmacion && !forzar) {
        // Hay conflictos con recurrencias: mostrar modal de confirmación
        payloadDisponibilidadPendiente = payload;
        mostrarModalConflictosDisponibilidad(res.afectados);
        return;
      }

      if(res.success) {
        showToast('success', 'Disponibilidad guardada');
        DispState.datosOriginales = JSON.parse(JSON.stringify(DispState.datosActuales));
        AdminState.disponibilidad = AdminState.disponibilidad.filter(d => String(d.id_recurso) !== String(DispState.recursoId));
        payload.forEach(p => AdminState.disponibilidad.push(p));
        checkDispChanges();
        payloadDisponibilidadPendiente = null;
      } else {
        showToast('error', res.error || 'Error al guardar');
      }
    })
    .withFailureHandler(err => { hideLoading(); showToast('error', err); })
    .saveBatchDisponibilidadConValidacion(payload, forzar);
}

function cerrarModalConflictosDisponibilidad() {
  const modal = document.getElementById('modalConflictosDisponibilidad');
  if (modal) modal.remove();
  payloadDisponibilidadPendiente = null;
}

function confirmarGuardarConConflictos() {
  // Cerrar modal pero NO resetear el payload todavía
  const modal = document.getElementById('modalConflictosDisponibilidad');
  if (modal) modal.remove();

  // Mostrar loading
  showLoading();

  // Reconstruir payload desde el estado actual
  const payload = DispState.datosActuales.map(d => ({
    id_recurso: DispState.recursoId,
    id_tramo: d.id_tramo,
    dia_semana: d.dia_semana,
    permitido: d.permitido,
    razon_bloqueo: d.razon_bloqueo
  }));

  google.script.run
    .withSuccessHandler(res => {
      hideLoading();
      payloadDisponibilidadPendiente = null;

      if (res.success) {
        showToast('success', 'Disponibilidad guardada y usuarios notificados');
        DispState.datosOriginales = JSON.parse(JSON.stringify(DispState.datosActuales));
        AdminState.disponibilidad = AdminState.disponibilidad.filter(d => String(d.id_recurso) !== String(DispState.recursoId));
        payload.forEach(p => AdminState.disponibilidad.push(p));
        checkDispChanges();
      } else {
        showToast('error', res.error || 'Error al guardar');
      }
    })
    .withFailureHandler(err => {
      hideLoading();
      payloadDisponibilidadPendiente = null;
      showToast('error', 'Error: ' + err);
    })
    .saveBatchDisponibilidadConValidacion(payload, true);
}

function descartarCambiosDisp() {
  mostrarConfirmacion('¿Descartar cambios?', 'Volverás a la configuración guardada.', () => {
      DispState.datosActuales = JSON.parse(JSON.stringify(DispState.datosOriginales));
      renderMatrizHTML();
      checkDispChanges();
      showToast('info', 'Cambios revertidos');
  });
}

function editarNota(idTramo, dia) {
  console.log(`[Modal] Abriendo para ${idTramo}-${dia}`);
  ensureModalExists();
  
  const dato = DispState.datosActuales.find(d => 
    String(d.id_tramo).trim() === String(idTramo).trim() && 
    d.dia_semana === dia
  );
  
  const txt = document.getElementById('notaTextarea');
  const inpId = document.getElementById('notaTramoId');
  const inpDia = document.getElementById('notaDia');

  if (txt) txt.value = dato ? (dato.razon_bloqueo || '') : '';
  if (inpId) inpId.value = idTramo;
  if (inpDia) inpDia.value = dia;
  
  const modal = document.getElementById('modalEditarNota');
  const panel = document.getElementById('modalPanelNota');
  
  if (modal && panel) {
      modal.classList.remove('hidden');
      requestAnimationFrame(() => {
          panel.classList.remove('scale-95', 'opacity-0');
          panel.classList.add('scale-100', 'opacity-100');
          // Foco al textarea después de la animación
          setTimeout(() => txt && txt.focus(), 50);
      });

      console.error("[Modal] No se encontraron elementos del modal");
  }

function cerrarModalEditarNota() {
  console.log("[Modal] Cerrando...");
  const modal = document.getElementById('modalEditarNota');
  const panel = document.getElementById('modalPanelNota');
  
  if (!modal || !panel) {
      console.warn("[Modal] Elementos no encontrados para cerrar");
      return;
  }

  // Animar salida
  panel.classList.remove('scale-100', 'opacity-100');
  panel.classList.add('scale-95', 'opacity-0');
  
  // Ocultar después de animación
  setTimeout(() => {
      modal.classList.add('hidden');
      console.log("[Modal] Cerrado correctamente");
  }, 200);
}

function guardarNotaModal() {
  console.log("[Modal] Guardando nota...");
  const txt = document.getElementById('notaTextarea');
  if (!txt) {
    console.error("[Modal] Textarea no encontrado");
    return;
  }

  const texto = txt.value.trim();
  const idTramo = document.getElementById('notaTramoId')?.value;
  const dia = document.getElementById('notaDia')?.value;
  
  if (!idTramo || !dia) {
    console.error("[Modal] Datos de tramo/día no encontrados");
    return;
  }
  
  let dato = DispState.datosActuales.find(d => 
    String(d.id_tramo).trim() === String(idTramo).trim() && 
    d.dia_semana === dia
  );

  if (dato) {
      dato.razon_bloqueo = texto;
      console.log("[Modal] Nota actualizada en dato existente");
  } else if (texto) {
      dato = { 
        id_tramo: idTramo, 
        dia_semana: dia, 
        permitido: 'No', 
        razon_bloqueo: texto 
      };
      DispState.datosActuales.push(dato);
      console.log("[Modal] Nueva nota creada");
  }
  
  cerrarModalEditarNota();
  actualizarCeldaVisualmente(idTramo, dia, dato);
  checkDispChanges();
}

// HELPER: Validación y Seguridad
const esEmailValido = (email) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);

// 0. Inicialización
function inicializarUsuarios() {
  if (!AdminState.usuarios) return;
  
  // Normalizar
  AdminState.usuarios = AdminState.usuarios.map(u => ({
      ...u,
      Nombre: u.Nombre || u.Nombre_Completo || '',
      Email: u.Email || u.Email_Usuario || '',
      Admin: (u.Admin === true || u.Admin === "TRUE" || u.Admin === "Si"),
      Activo: (u.Activo === true || u.Activo === "TRUE" || u.Activo === "Si")
  }));

  AdminState.usuariosOriginales = JSON.parse(JSON.stringify(AdminState.usuarios));
  renderTablaUsuarios();
}

// 1. Renderizar Tabla (Con 'data-usuario-index')
function renderTablaUsuarios() {
  const tbody = document.getElementById('tablaUsuariosBody');
  if (!tbody) return;
  
  // Guardar scroll
  const scrollPos = tbody.parentElement ? tbody.parentElement.scrollTop : 0;

  // Asegurar table-fixed por si acaso
  const tabla = tbody.closest('table');
  if (tabla && !tabla.classList.contains('table-fixed')) {
      tabla.classList.add('table-fixed');
  }

  tbody.innerHTML = '';
  const filtro = (document.getElementById('buscadorUsuarios')?.value || '').toLowerCase();
  
  const lista = AdminState.usuarios.filter(u => {
    const nombre = u.Nombre.toLowerCase();
    const email = u.Email.toLowerCase();
    return nombre.includes(filtro) || email.includes(filtro);
  });

  const countSpan = document.getElementById('totalUsuariosCount');
  if(countSpan) {
      const total = AdminState.usuarios.length;
      countSpan.innerText = lista.length === total ? total : `${lista.length} / ${total}`;
  }

  if (lista.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5" class="text-center py-12 text-gray-400">No se encontraron usuarios</td></tr>`;
    return;
  }

  const fragment = document.createDocumentFragment();

  lista.forEach((usuario) => {
    const index = AdminState.usuarios.indexOf(usuario); // Índice REAL
    const rnd = Math.random().toString(36).substring(7);
    const inicial = usuario.Nombre.charAt(0).toUpperCase() || '?';

    const tr = document.createElement('tr');
    tr.className = 'hover:bg-gray-50 transition-colors border-b border-gray-100 group';
    
    // ✅ CLAVE 1: Añadimos el índice como atributo para encontrarlo luego
    tr.setAttribute('data-usuario-index', index);

    tr.innerHTML = `
      <td class="pl-6 pr-2 py-4 whitespace-nowrap">
        <div class="h-10 w-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold border border-blue-200 shadow-sm select-none">
          ${inicial}
        </div>
      </td>

      <td class="px-2 py-3">
        <div class="flex flex-col gap-1 w-full">
          <input type="text" 
                 value="${escaparHTML(usuario.Nombre)}" 
                 oninput="editarUsuario(${index}, 'Nombre', this.value)"
                 class="w-full bg-transparent border-b border-transparent hover:border-gray-300 focus:border-blue-500 focus:outline-none text-sm font-medium text-gray-900 px-1 transition-colors truncate"
                 autocomplete="off" name="user_name_${rnd}">
                 
          <input type="text" 
                 value="${escaparHTML(usuario.Email)}"
                 oninput="editarUsuario(${index}, 'Email', this.value)"
                 class="w-full bg-transparent border-b border-transparent hover:border-gray-300 focus:border-blue-500 focus:outline-none text-xs text-gray-500 px-1 transition-colors truncate ${!esEmailValido(usuario.Email) && usuario.Email ? 'text-red-500 font-bold' : ''}"
                 autocomplete="off" name="user_email_${rnd}">
        </div>
      </td>

      <td class="px-2 py-3 whitespace-nowrap text-center">
        <div class="flex flex-col items-center justify-center cursor-pointer group/toggle" onclick="toggleUsuarioPropiedad(${index}, 'Admin')">
            <div class="relative inline-flex h-5 w-9 items-center rounded-full transition-colors ${usuario.Admin ? 'bg-purple-600' : 'bg-gray-200 group-hover/toggle:bg-gray-300'}">
                <span class="translate-x-1 inline-block h-3 w-3 transform rounded-full bg-white transition-transform ${usuario.Admin ? 'translate-x-5' : 'translate-x-1'}"></span>
            </div>
            <span class="text-[10px] text-gray-400 mt-1 select-none w-full text-center block h-3 leading-3">
                ${usuario.Admin ? 'Admin' : 'Usuario'}
            </span>
        </div>
      </td>

      <td class="px-2 py-3 whitespace-nowrap text-center">
        <div class="flex flex-col items-center justify-center cursor-pointer group/toggle" onclick="toggleUsuarioPropiedad(${index}, 'Activo')">
            <div class="relative inline-flex h-5 w-9 items-center rounded-full transition-colors ${usuario.Activo ? 'bg-green-500' : 'bg-gray-200 group-hover/toggle:bg-gray-300'}">
                <span class="translate-x-1 inline-block h-3 w-3 transform rounded-full bg-white transition-transform ${usuario.Activo ? 'translate-x-5' : 'translate-x-1'}"></span>
            </div>
             <span class="text-[10px] text-gray-400 mt-1 select-none w-full text-center block h-3 leading-3">
                ${usuario.Activo ? 'Activo' : 'Inactivo'}
             </span>
        </div>
      </td>
      
      <td class="px-4 py-3 whitespace-nowrap text-right">
         <button onclick="eliminarUsuario(${index})" 
                class="text-gray-300 hover:text-red-600 p-2 rounded-full hover:bg-red-50 transition-colors opacity-100 sm:opacity-0 sm:group-hover:opacity-100">
          <iconify-icon icon="mdi:trash-can-outline" width="20"></iconify-icon>
        </button>
      </td>
    `;
    fragment.appendChild(tr);
  });
  
  tbody.appendChild(fragment);
  if(tbody.parentElement) tbody.parentElement.scrollTop = scrollPos;
  actualizarBotonGuardarUsuarios();
}

// 2. Toggle "QUIRÚRGICO" (Sin repintar toda la tabla)
function toggleUsuarioPropiedad(index, propiedad) {
  // 1. Actualizar memoria (Modelo)
  AdminState.usuarios[index][propiedad] = !AdminState.usuarios[index][propiedad];
  const nuevoValor = AdminState.usuarios[index][propiedad];
  
  // 2. Buscar fila en DOM (Vista)
  const tbody = document.getElementById('tablaUsuariosBody');
  const fila = tbody.querySelector(`tr[data-usuario-index="${index}"]`);
  
  // Fallback de seguridad: Si no encontramos la fila (ej. filtro raro), repintamos todo
  if (!fila) {
    renderTablaUsuarios();
    checkUsuariosChanges();
    return;
  }
  
  // 3. Modificar SOLO el elemento afectado
  // Columna 2 = Admin (índice 2 en children porque Avatar es 0 y Datos es 1)
  // Columna 3 = Activo (índice 3 en children)
  const colIndex = propiedad === 'Admin' ? 2 : 3;
  const celda = fila.children[colIndex];
  
  if (celda) {
      const slider = celda.querySelector('.inline-flex');
      const circle = slider.querySelector('span');
      const label = celda.querySelector('.text-\\[10px\\]');
      
      // Aplicar clases según estado
      if (nuevoValor) {
        // ACTIVO (ON)
        slider.className = `relative inline-flex h-5 w-9 items-center rounded-full transition-colors ${propiedad === 'Admin' ? 'bg-purple-600' : 'bg-green-500'}`;
        circle.className = 'translate-x-1 inline-block h-3 w-3 transform rounded-full bg-white transition-transform translate-x-5';
        label.textContent = propiedad === 'Admin' ? 'Admin' : 'Activo';
      } else {
        // INACTIVO (OFF)
        slider.className = 'relative inline-flex h-5 w-9 items-center rounded-full transition-colors bg-gray-200 group-hover/toggle:bg-gray-300';
        circle.className = 'translate-x-1 inline-block h-3 w-3 transform rounded-full bg-white transition-transform translate-x-1';
        label.textContent = propiedad === 'Admin' ? 'Usuario' : 'Inactivo';
      }
  }
  
  // 4. Check cambios (SaveBar)
  checkUsuariosChanges();
}

// 3. Edición
function editarUsuario(index, campo, valor) {
  AdminState.usuarios[index][campo] = valor;
  checkUsuariosChanges();
}

  const nombreSeguro = escaparHTML(usuario.Nombre || usuario.Email || 'Usuario');

  mostrarConfirmacion(

// 6. Check changes
function checkUsuariosChanges() {
  const actual = JSON.stringify(AdminState.usuarios);
  const original = JSON.stringify(AdminState.usuariosOriginales);
  
  AdminState.cambiosPendientes = (actual !== original);
  actualizarBotonGuardarUsuarios();

function actualizarBotonGuardarUsuarios() {
  if (AdminState.cambiosPendientes) {
    const diff = Math.abs(AdminState.usuarios.length - AdminState.usuariosOriginales.length);
    SaveBarManager.show(
        diff > 0 ? `${diff} cambios en lista` : 'Permisos modificados', 
        guardarCambiosUsuarios, 
        descartarCambiosUsuarios
    );
  } else {
    SaveBarManager.hide();
  }
}

// 7. Guardar
function guardarCambiosUsuarios() {
  const errores = [];
  AdminState.usuarios.forEach((u, i) => {
      if (!u.Nombre || u.Nombre.trim().length < 2) errores.push(`Fila ${i+1}: Falta nombre`);
      if (!esEmailValido(u.Email)) errores.push(`Fila ${i+1}: Email inválido`);
  });

  if (errores.length > 0) {
      showToast('warning', `Revisa los datos: ${errores.slice(0,3).join('. ')}`);
      return;
  }

  showLoading();
  
  const payload = AdminState.usuarios.map(u => ({
      Nombre: u.Nombre.trim(),
      Email: u.Email.trim().toLowerCase(),
      Admin: u.Admin,
      Activo: u.Activo
  }));

  google.script.run
    .withSuccessHandler(res => {
      hideLoading();
      if(res.success) {
        showToast('success', 'Usuarios actualizados');
        AdminState.usuariosOriginales = JSON.parse(JSON.stringify(AdminState.usuarios));
        checkUsuariosChanges();
      } else {
        showToast('error', res.error);
      }
    })
    .withFailureHandler(err => { hideLoading(); showToast('error', err); })
    .saveBatchUsuarios(payload);
}

// 8. Descartar
function descartarCambiosUsuarios() {
  mostrarConfirmacion('¿Descartar cambios?', 'Se perderán las modificaciones.', () => {
      if (AdminState.usuariosOriginales) {
          AdminState.usuarios = JSON.parse(JSON.stringify(AdminState.usuariosOriginales));
      }

      checkUsuariosChanges();

function renderTablaCursos(filtro = null) {

  // ✅ Preservar scroll
  const scrollPos = tbody.parentElement ? tbody.parentElement.scrollTop : 0;

  if (!filtro && typeof enableGenericDragAndDrop === 'function') {

// Función auxiliar para normalizar formato HH:mm
function normalizarHora(hora) {
  if (!hora) return '';
  
  // Si ya viene como objeto Date, convertir
  if (hora instanceof Date) {
    const h = String(hora.getHours()).padStart(2, '0');
    const m = String(hora.getMinutes()).padStart(2, '0');
    return `${h}:${m}`;
  }
  
  // Si es string, asegurar formato HH:mm
  const partes = String(hora).split(':');
  if (partes.length >= 2) {
    const h = partes[0].padStart(2, '0');
    const m = partes[1].padStart(2, '0');
    return `${h}:${m}`;
  }
  
  return hora;
}

  const originalStr = JSON.stringify(cleanOriginal);
  
  AdminState.cambiosPendientes = (currentStr !== originalStr);
  actualizarEstadoBotonGuardarTramos();
}

function actualizarEstadoBotonGuardarTramos() {
  if (AdminState.cambiosPendientes) {
    const diff = AdminState.tramos.length - (AdminState.tramosOriginales || []).length;
    let texto = "Horarios modificados";
    if (diff > 0) texto = `${diff} tramos añadidos`;
    if (diff < 0) texto = `${Math.abs(diff)} tramos eliminados`;

    SaveBarManager.show(texto, guardarCambiosTramos, descartarCambiosTramos);
  } else {
    SaveBarManager.hide();

}

// --- HELPERS ---
const setCfgVal = (id, value) => {
  const el = document.getElementById(id);
  if (el) el.value = (value === null || value === undefined) ? '' : String(value);
};

const getCfgVal = (id) => {
  const el = document.getElementById(id);
  return el ? el.value.trim() : '';
};

const setCfgCheck = (id, value) => {
  const el = document.getElementById(id);
  if (el) el.checked = (value === true || value === 'true' || value === 'Si' || value === 1);
};

const getCfgCheck = (id) => {

// --- INICIALIZACIÓN (CORREGIDA) ---
function inicializarConfiguracion() {
  if (!AdminState.config) return;

  renderConfiguracion();
  
  // 2. LUEGO crear snapshot desde el DOM (valores ya normalizados)
  ConfigState.configOriginal = construirConfigDesdeInputs();

  // 3. Activar listeners
  attachConfigListeners();

}

// --- RENDERIZAR ---
function renderConfiguracion() {
  if (!AdminState.config) return;

  const configMap = {};
  AdminState.config.forEach(c => configMap[c.clave] = c.valor);

  // Renderizar TODOS los campos con defaults

  setCfgVal('cfg_url_logo',            configMap['url_logo'] || '');
