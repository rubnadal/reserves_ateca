  setCfgCheck('cfg_admin_recibir_copia_reservas', configMap['admin_recibir_copia_reservas']);
}

// --- LISTENERS ---
function attachConfigListeners() {
  if (window.configListenersAttached) return;

  const ids = [
    'cfg_dias_vista_maximo', 'cfg_minutos_antelacion', 'cfg_limite_reservas',
    'cfg_horas_cancelacion', 'cfg_email_admin', 'cfg_nombre_centro',
    'cfg_url_logo', 'cfg_max_tramos_simultaneos', 'cfg_permitir_multitramo',
    'cfg_exigir_motivo', 'cfg_modo_mantenimiento', 'cfg_admin_recibir_copia_reservas'
  ];
  
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      el.addEventListener('input', checkConfigChanges);
      el.addEventListener('change', checkConfigChanges);
    }
  });

  window.configListenersAttached = true;
}

// --- DETECCIÓN DE CAMBIOS ---
function checkConfigChanges() {
  if (!ConfigState.configOriginal) return;
  
  const configActual = construirConfigDesdeInputs();
  
  // Comparar JSONs ordenados
  const sortFunc = (a,b) => a.clave.localeCompare(b.clave);
  const actualStr = JSON.stringify(configActual.sort(sortFunc));
  const originalStr = JSON.stringify([...ConfigState.configOriginal].sort(sortFunc));
  
  ConfigState.cambiosPendientes = (actualStr !== originalStr);
  
  if (ConfigState.cambiosPendientes) {
    SaveBarManager.show('Configuración modificada', guardarConfiguracion, descartarCambiosConfiguracion);
  } else {
    SaveBarManager.hide();
  }
}

function construirConfigDesdeInputs() {
  return [
    { clave: 'dias_vista_maximo',  valor: getCfgVal('cfg_dias_vista_maximo') },
    { clave: 'minutos_antelacion', valor: getCfgVal('cfg_minutos_antelacion') },
    { clave: 'limite_reservas',    valor: getCfgVal('cfg_limite_reservas') },
    { clave: 'horas_cancelacion',  valor: getCfgVal('cfg_horas_cancelacion') },
    { clave: 'email_admin',        valor: getCfgVal('cfg_email_admin') },
    { clave: 'nombre_centro',      valor: getCfgVal('cfg_nombre_centro') },
    { clave: 'url_logo',           valor: getCfgVal('cfg_url_logo') },
    { clave: 'max_tramos_simultaneos', valor: getCfgVal('cfg_max_tramos_simultaneos') },
    { clave: 'permitir_multitramo',    valor: getCfgCheck('cfg_permitir_multitramo') },
    { clave: 'exigir_motivo',      valor: getCfgCheck('cfg_exigir_motivo') },
    { clave: 'modo_mantenimiento', valor: getCfgCheck('cfg_modo_mantenimiento') },
    { clave: 'admin_recibir_copia_reservas', valor: getCfgCheck('cfg_admin_recibir_copia_reservas') }
  ];
}

// --- VALIDACIÓN ---
function validarConfiguracion() {
  const errores = [];
  
  const diasVista = parseInt(getCfgVal('cfg_dias_vista_maximo'));
  if (isNaN(diasVista) || diasVista < 1 || diasVista > 365) {
    errores.push('Días de vista: entre 1 y 365');
  }
  
  const minAnt = parseInt(getCfgVal('cfg_minutos_antelacion'));
  if (isNaN(minAnt) || minAnt < 0) {
    errores.push('Minutos antelación: debe ser positivo');
  }
  
  const limRes = parseInt(getCfgVal('cfg_limite_reservas'));
  if (isNaN(limRes) || limRes < 1 || limRes > 50) {
    errores.push('Límite reservas: entre 1 y 50');
  }
  
  const horasCanc = parseInt(getCfgVal('cfg_horas_cancelacion'));
  if (isNaN(horasCanc) || horasCanc < 0) {
    errores.push('Horas cancelación: debe ser positivo');
  }
  
  const maxTramos = parseInt(getCfgVal('cfg_max_tramos_simultaneos'));
  if (isNaN(maxTramos) || maxTramos < 1 || maxTramos > 10) {
    errores.push('Tramos simultáneos: entre 1 y 10');
  }
  
  const email = getCfgVal('cfg_email_admin');
  if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    errores.push('Email de administrador inválido');
  }
  
  const urlLogo = getCfgVal('cfg_url_logo');
  if (urlLogo && !/^https?:\/\/.+/.test(urlLogo)) {
    errores.push('URL del logo debe empezar con http:// o https://');
  }
  // Validar que si es URL de Drive, tenga un formato reconocible
  if (urlLogo && urlLogo.includes('drive.google.com')) {
    const drivePatterns = [
      /\/file\/d\/([a-zA-Z0-9_-]+)/,
      /[?&]id=([a-zA-Z0-9_-]+)/,
      /\/d\/([a-zA-Z0-9_-]+)/
    ];
    const isValidDriveUrl = drivePatterns.some(p => p.test(urlLogo));
    if (!isValidDriveUrl) {
      errores.push('URL de Google Drive no reconocida. Usa el enlace "Compartir" del archivo.');
    }
  }
  
  return errores;
}

// --- GUARDAR ---
function guardarConfiguracion() {
  const errores = validarConfiguracion();
  if (errores.length > 0) {
    showToast('warning', `Revisa: ${errores.slice(0, 2).join('. ')}`);
    return;
  }

  showLoading();
  const newConfig = construirConfigDesdeInputs();

  // Verificar si hay URL de logo de Drive para procesar permisos
  const urlLogoConfig = newConfig.find(c => c.clave === 'url_logo');
  const urlLogo = urlLogoConfig ? urlLogoConfig.valor : '';
  const esDriveUrl = urlLogo && urlLogo.includes('drive.google.com');

  if (esDriveUrl) {
    // Primero procesar la URL de Drive para cambiar permisos
    google.script.run
      .withSuccessHandler(driveResult => {
        if (driveResult.warning) {
          showToast('warning', driveResult.message, 5000);
        } else if (driveResult.isDrive && driveResult.permissionsChanged) {
          showToast('info', 'Permisos de imagen actualizados automáticamente');
        }
        // Continuar guardando la configuración
        finalizarGuardadoConfiguracion(newConfig);
      })
      .withFailureHandler(err => {
        // Aunque falle el procesamiento de Drive, intentar guardar la config
        console.warn('Error procesando URL de Drive:', err);
        finalizarGuardadoConfiguracion(newConfig);
      })
      .procesarUrlLogoDrive(urlLogo);
  } else {
    // No es URL de Drive, guardar directamente
    finalizarGuardadoConfiguracion(newConfig);
  }
}

function finalizarGuardadoConfiguracion(newConfig) {
  google.script.run
    .withSuccessHandler(res => {
      hideLoading();
      if(res.success) {
        showToast('success', 'Configuración guardada');

        AdminState.config = newConfig;
        ConfigState.configOriginal = JSON.parse(JSON.stringify(newConfig));
        ConfigState.cambiosPendientes = false;

        SaveBarManager.hide();
      } else {
        showToast('error', res.error);
      }
    })
    .withFailureHandler(err => {
      hideLoading();
      showToast('error', err);
    })
    .saveBatchConfig(newConfig);
}

/* ==========================================
   7.1. DRAG & DROP UNIVERSAL (OPTIMIZADO V2 🚀)

// Tracker global para limpiar listeners y evitar memory leaks
const DragDropManager = {
  activeInstances: new Map(), // guarda: tbody.id -> función de limpieza
  
  cleanup(tableBodyId) {
    const cleanup = this.activeInstances.get(tableBodyId);
    if (cleanup) {
      cleanup();
      this.activeInstances.delete(tableBodyId);
    }
  }
};

function enableGenericDragAndDrop(tableBodyId, onReorderCallback) {
  const tbody = document.getElementById(tableBodyId);
  if (!tbody) return;

  // 1. LIMPIEZA PREVIA (CRÍTICO: Elimina los listeners "zombis")
  DragDropManager.cleanup(tableBodyId);

  const rows = tbody.querySelectorAll('tr.draggable-row');
  let dragSrcEl = null;
  let currentDropTarget = null; // Cache para rendimiento

  // Función de limpieza visual
  const limpiarEstilos = () => {
    if (currentDropTarget) {
      currentDropTarget.classList.remove('drop-target');
      currentDropTarget = null;
    }
    const dragging = tbody.querySelector('.dragging');
    if (dragging) dragging.classList.remove('dragging');
  };

  // Array para guardar los "removeEventListener" de esta instancia
  const cleanupFunctions = [];

  rows.forEach(row => {
    // --- LÓGICA DE RATÓN (PC) ---
    
    const onDragStart = function(e) {
      dragSrcEl = this;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/html', this.innerHTML);
      this.classList.add('dragging');
    };

    const onDragEnd = function() {
      this.classList.remove('dragging');
      limpiarEstilos();
    };

    const onDragOver = function(e) {
      if (e.preventDefault) e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      
      if (dragSrcEl !== this) {
        // Optimización: Solo tocar el DOM si cambia el target
        if (currentDropTarget !== this) {
          if (currentDropTarget) currentDropTarget.classList.remove('drop-target');
          this.classList.add('drop-target');
          currentDropTarget = this;
        }
      }
      return false;
    };

    const onDragLeave = function() {
      this.classList.remove('drop-target');
      if (currentDropTarget === this) currentDropTarget = null;
    };

    const onDrop = function(e) {
      if (e.stopPropagation) e.stopPropagation();
      limpiarEstilos();

      if (dragSrcEl !== this) {
        const oldIndex = parseInt(dragSrcEl.dataset.index);
        const newIndex = parseInt(this.dataset.index);
        if (typeof onReorderCallback === 'function') {
          onReorderCallback(oldIndex, newIndex);
        }
      }
      return false;
    };

    // Añadir listeners PC
    row.addEventListener('dragstart', onDragStart);
    row.addEventListener('dragend', onDragEnd);
    row.addEventListener('dragover', onDragOver);
    row.addEventListener('dragleave', onDragLeave);
    row.addEventListener('drop', onDrop);

    // Guardar limpiadores PC
    cleanupFunctions.push(() => {
      row.removeEventListener('dragstart', onDragStart);
      row.removeEventListener('dragend', onDragEnd);
      row.removeEventListener('dragover', onDragOver);
      row.removeEventListener('dragleave', onDragLeave);
      row.removeEventListener('drop', onDrop);
    });

    // --- LÓGICA TÁCTIL (MÓVIL) ---
    
    const handle = row.querySelector('.handle');
    
    if (handle) {
      let touchStartedOnHandle = false;

      const onTouchStart = function(e) {
        // Solo iniciamos si tocamos el handle, permitiendo scroll en el resto
        touchStartedOnHandle = true;
        e.preventDefault(); // Evitar scroll mientras arrastramos el handle
        dragSrcEl = row;
        row.classList.add('dragging');
      };

      const onTouchMove = function(e) {
        if (!touchStartedOnHandle) return;
        
        e.preventDefault(); // Stop scroll
        
        const touch = e.touches[0];
        const targetElement = document.elementFromPoint(touch.clientX, touch.clientY);
        const targetRow = targetElement ? targetElement.closest('tr.draggable-row') : null;

        if (targetRow && targetRow !== currentDropTarget && targetRow !== dragSrcEl && tbody.contains(targetRow)) {
          if (currentDropTarget) currentDropTarget.classList.remove('drop-target');
          targetRow.classList.add('drop-target');
          currentDropTarget = targetRow;
        } else if (!targetRow && currentDropTarget) {
          currentDropTarget.classList.remove('drop-target');
          currentDropTarget = null;
        }
      };

      const onTouchEnd = function(e) {
        if (!touchStartedOnHandle) return;
        
        const touch = e.changedTouches[0];
        const targetElement = document.elementFromPoint(touch.clientX, touch.clientY);
        const targetRow = targetElement ? targetElement.closest('tr.draggable-row') : null;

        limpiarEstilos();
        row.classList.remove('dragging');
        touchStartedOnHandle = false;

        if (targetRow && targetRow !== dragSrcEl && tbody.contains(targetRow)) {
          const oldIndex = parseInt(dragSrcEl.dataset.index);
          const newIndex = parseInt(targetRow.dataset.index);
          
          if (typeof onReorderCallback === 'function') {
            onReorderCallback(oldIndex, newIndex);
          }
        }
      };

      // Añadir listeners Móvil
      handle.addEventListener('touchstart', onTouchStart, { passive: false });
      handle.addEventListener('touchmove', onTouchMove, { passive: false });
      handle.addEventListener('touchend', onTouchEnd);

      // Guardar limpiadores Móvil
      cleanupFunctions.push(() => {
        handle.removeEventListener('touchstart', onTouchStart);
        handle.removeEventListener('touchmove', onTouchMove);
        handle.removeEventListener('touchend', onTouchEnd);
      });
    }
  });

  // Registrar la limpieza global para este TBODY
  DragDropManager.activeInstances.set(tableBodyId, () => {
    cleanupFunctions.forEach(fn => fn());
  });
}

// ✅ Función segura para mover elementos en array
function arrayMove(arr, oldIndex, newIndex) {
    if (oldIndex < 0 || oldIndex >= arr.length) return arr;
    if (newIndex < 0 || newIndex >= arr.length) return arr;
    
    const item = arr.splice(oldIndex, 1)[0];
    arr.splice(newIndex, 0, item);
    return arr;
}

// Exportar
window.DragDropManager = DragDropManager;
window.enableGenericDragAndDrop = enableGenericDragAndDrop;
window.arrayMove = arrayMove;

function filtrarIconosGrid() {
  const query = document.getElementById('searchIconInput').value.trim();
  
  // Si está vacío, volvemos a las categorías locales
  if (query.length === 0) {
    renderGridLocal('General');
    return;
  }
  
  if (query.length < 3) return;

  // Loading state
  document.getElementById('iconGrid').innerHTML = `
    <div class="col-span-full flex flex-col items-center justify-center py-8 text-gray-400">
      <iconify-icon icon="mdi:loading" class="text-3xl animate-spin mb-2"></iconify-icon>
      <span class="text-xs">Buscando en Iconify...</span>
    </div>
  `;

  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => { buscarEnIconifyAPI(query); }, 500);
}

function buscarEnIconifyAPI(query) {
  // Buscamos solo en MDI (Material Design) para mantener coherencia
  const url = `https://api.iconify.design/search?query=${query}&limit=100`;
  
  fetch(url)
    .then(res => res.json())
    .then(data => {
      if (data.icons && data.icons.length > 0) renderIconsToGrid(data.icons);
      else renderIconsToGrid([]);
    })
    .catch(() => {
        document.getElementById('iconGrid').innerHTML = `<div class="col-span-full text-center text-red-400 text-xs">Error de conexión</div>`;
    });
}

function seleccionarIcono(iconName) {
  if (indexRecursoEditandoIcono === null || indexRecursoEditandoIcono === undefined) {
    console.error('❌ No hay índice seleccionado');
    cerrarSelectorIconos();
    return;
  }
  
  const index = indexRecursoEditandoIcono;
  
  // Validar que el recurso existe
  if (!AdminState.recursos[index]) {
    console.error(`❌ Recurso ${index} no existe. Total recursos: ${AdminState.recursos.length}`);
    cerrarSelectorIconos();
    return;
  }
  
  // 1. Actualizar en memoria directamente (sin llamar a editarRecursoInput)
  AdminState.recursos[index].icono = iconName;
  
  // 2. Actualizar visualmente SOLO el icono (cirugía quirúrgica)
  const iconElement = document.querySelector(`button[onclick="abrirSelectorIconos(${index})"] iconify-icon`);
  if (iconElement) {
    iconElement.setAttribute('icon', iconName);
  }
  
  // 3. Marcar cambios pendientes
  if (typeof checkRecursosChanges === 'function') {
    checkRecursosChanges();
  }
  
  // 4. Cerrar modal
  cerrarSelectorIconos();
}

function extraerNumeroTramo(idTramo) {
  if (!idTramo) return 0;
  const match = String(idTramo).match(/\d+/);

}

function loadAdminData(isSilent = false) {
  if (adminDataReady || adminDataLoading) return;

  adminDataLoading = true;

  if (!isSilent) showLoading(); 

  google.script.run
    .withSuccessHandler(function(data) {
      if (!isSilent) hideLoading(); 
      
      if (!data || !data.success) {
        if (!isSilent) showToast('error', data ? (data.error || 'Error al cargar datos') : 'Error servidor');
        adminDataLoading = false;
        return;
      }

      console.group(isSilent ? "✅ Precarga Admin Silenciosa Completada" : "✅ Carga Admin Usuario Completada");

      // --- 1. GUARDAR DATOS ---
      AdminState.recursos = data.recursos || [];
      AdminState.tramos = data.tramos || [];
      AdminState.cursos = data.cursos || [];
      AdminState.usuarios = data.usuarios || [];
      AdminState.reservas = data.reservas || [];
      AdminState.config = data.config || [];
      AdminState.modoVisualizacion = data.modoVisualizacion || 'botones'; // ✅ AÑADIDO

      // --- 2. COPIAS DE SEGURIDAD ---
      AdminState.recursosOriginales = JSON.parse(JSON.stringify(AdminState.recursos));
      AdminState.usuariosOriginales = JSON.parse(JSON.stringify(AdminState.usuarios));

      // --- 3. DISPONIBILIDAD ---
      const dispCruda = data.disponibilidad || [];
      AdminState.disponibilidad = dispCruda.map(d => ({
          id_recurso: String(d.id_recurso || d.ID_Recurso || '').trim(),
          id_tramo: String(d.id_tramo || d.ID_Tramo || '').trim(),
          dia_semana: String(d.dia_semana || d.Dia_Semana || '').trim(),
          permitido: String(d.permitido || d.Permitido || 'Si').trim(),
          razon_bloqueo: String(d.razon_bloqueo || d.Razon_Bloqueo || '').trim()
      }));

      // --- 4. RENDERIZADO E INICIALIZACIÓN ---
      // ❌ ELIMINADO: if(typeof CursosState !== 'undefined') CursosState.modoVisualizacion = data.modoVisualizacion || 'botones';
      
      if (typeof renderTablaRecursos === 'function') renderTablaRecursos();
      if (typeof inicializarRecursos === 'function') inicializarRecursos(); 
      if (typeof inicializarTramos === 'function') inicializarTramos(); 
      if (typeof renderSelectRecursos === 'function') renderSelectRecursos();
      if (typeof inicializarCursos === 'function') inicializarCursos(); 
      if (typeof inicializarUsuarios === 'function') inicializarUsuarios();
      if (typeof renderTablaReservas === 'function') renderTablaReservas();
      if (typeof inicializarConfiguracion === 'function') inicializarConfiguracion();

      // --- 5. FINALIZAR ---
      AdminState.cambiosPendientes = false;
      if (typeof SaveBarManager !== 'undefined') SaveBarManager.hide();

      adminDataReady = true; 
      adminDataLoading = false;

      // --- LÓGICA VISUAL FINAL ---
      if (!isSilent && typeof openAdminPanelUI === 'function') {
          openAdminPanelUI();
      } else {
          console.log("✅ Datos Admin listos en segundo plano (Invisible)");
      }
      
      console.groupEnd();
     })
     .withFailureHandler(function(error) {
      if (!isSilent) {
          hideLoading();
          showToast('error', 'Error de conexión: ' + error.message);
      }
      console.warn("⚠️ Fallo en precarga silenciosa:", error);
      adminDataLoading = false;
    })
    .getAdminData();
}

/* =========================================================
   9.1. GESTIÓN DE CIERRE DE DROPDOWNS (GLOBAL) 🖱️
   ========================================================= */
document.addEventListener('click', function(e) {
  
  // A. CERRAR DROPDOWNS GENÉRICOS (IDs que empiezan por "dropdown-")
  // Solo cerramos si el click NO fue dentro del propio dropdown ni en su botón activador
  const dropdowns = document.querySelectorAll('[id^="dropdown-"]:not(.hidden)');
  dropdowns.forEach(drop => {
    // Asumimos que el botón activador tiene un ID o clase relacionable, 
    // pero para asegurar, cerramos si el click no está dentro del dropdown.
    if (!drop.contains(e.target)) {
       // Nota: Si tus botones no tienen stopPropagation(), esto podría cerrar el menú 
       // justo al abrirlo. Lo ideal es controlar esto en la función de abrir.
       drop.classList.add('hidden');
    }
  });

  // B. CERRAR EL DROPDOWN ESPECÍFICO DE RECURSOS (Tu código específico)
  const dropRecurso = document.getElementById('dropdownRecursoDisp');
  const btnRecurso = document.getElementById('btnSelectorRecursoDisp');
  
  if (dropRecurso && !dropRecurso.classList.contains('hidden')) {
      // Si el click NO fue en el dropdown Y NO fue en el botón
      if (!dropRecurso.contains(e.target) && !btnRecurso.contains(e.target)) {
          dropRecurso.classList.add('hidden');
      }
  }
});

function fixMenusFlotantes() {
  const ids = [
    'accionesTramosFlotante', 
    'accionesCursosFlotante', 
    'accionesUsuariosFlotante'
  ];
  
  ids.forEach(id => {
    const elemento = document.getElementById(id);
    if (elemento && elemento.parentNode !== document.body) {
      // Lo arrancamos de su cárcel y lo liberamos en el body
      document.body.appendChild(elemento);
    }
  });
}

/**
 * Ejecuta la aprobación masiva de solicitudes
 */
async function ejecutarAprobarTodasPendientes(pendientes) {
  // Mostrar overlay de progreso
  const overlay = document.createElement('div');
  overlay.id = 'overlayAprobandoTodas';
  overlay.className = 'fixed inset-0 z-[10002] bg-gray-900/50 backdrop-blur-sm flex items-center justify-center';
  overlay.innerHTML = `
    <div class="bg-white rounded-2xl shadow-2xl p-6 max-w-xs w-full mx-4 text-center">
      <iconify-icon icon="mdi:loading" class="text-4xl text-blue-600 animate-spin"></iconify-icon>
      <p class="mt-3 font-semibold text-gray-800">Aprobando solicitudes...</p>
      <p id="progresoAprobacion" class="text-sm text-gray-500 mt-1">0 de ${pendientes.length}</p>
    </div>
  `;
  document.body.appendChild(overlay);

  let aprobadas = 0;
  let errores = 0;

  for (const sol of pendientes) {
    try {
      const result = await new Promise((resolve, reject) => {
        google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(reject)
          .aprobarSolicitudRecurrente(sol.id_solicitud);
      });

      if (result && result.success) {
        aprobadas++;
      } else {
        errores++;
      }
    } catch (error) {
      errores++;
    }

    // Actualizar progreso
    const progreso = document.getElementById('progresoAprobacion');
    if (progreso) {
      progreso.textContent = `${aprobadas + errores} de ${pendientes.length}`;
    }
  }

  // Quitar overlay
  overlay.remove();

  if (aprobadas > 0) {
    showToast('success', `${aprobadas} solicitudes aprobadas`);
  }
  if (errores > 0) {
    showToast('warning', `${errores} solicitudes con error`);
  }

  // Recargar datos
  await cargarSolicitudesRecurrentesGlobal();
  if (DispState.recursoId) {
    cargarMatrizDisponibilidad(DispState.recursoId);
  }
}

/**
 * Aprueba todas las solicitudes pendientes
 */
async function aprobarTodasPendientes() {
  const pendientes = AdminState.solicitudesRecurrentes.filter(s =>
    (s.estado || '').toLowerCase() === 'pendiente'
  );

  if (pendientes.length === 0) {
    showToast('info', 'No hay solicitudes pendientes para aprobar');
    return;
  }

  if (!confirm(`¿Aprobar ${pendientes.length} solicitud(es) pendiente(s)?\n\nEsto generará todas las reservas correspondientes.`)) {
    return;
  }

  const btn = document.getElementById('btnAprobarTodasPendientes');
  const textoOriginal = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span class="animate-spin inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full mr-2"></span>Procesando...';

  let aprobadas = 0;
  let errores = 0;
  let totalReservas = 0;

  for (const sol of pendientes) {
    try {
      const result = await new Promise((resolve, reject) => {
        google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(reject)
          .aprobarSolicitudRecurrente(sol.id_solicitud, 'Aprobación masiva');
      });

      if (result && result.success) {
        aprobadas++;
        totalReservas += result.reservasGeneradas || 0;
      } else {
        errores++;
      }
    } catch (e) {
      console.error('Error aprobando:', sol.id_solicitud, e);
      errores++;
    }
  }

  btn.disabled = false;
  btn.innerHTML = textoOriginal;

  if (errores === 0) {
    showToast('success', `${aprobadas} solicitud(es) aprobada(s). ${totalReservas} reservas generadas.`);
  } else {
    showToast('warning', `Aprobadas: ${aprobadas}, Errores: ${errores}. Revisa los detalles.`);
  }

  await cargarSolicitudesRecurrentes();
  adminHaCambiadoDatos = true;
}

/**
 * Cancela una recurrencia aprobada
 */
function cancelarRecurrenciaAprobada(idSolicitud) {
  const solicitud = AdminState.solicitudesRecurrentes.find(s => s.id_solicitud === idSolicitud);
  if (!solicitud) {
    showToast('error', 'Solicitud no encontrada');
    return;
  }

  mostrarConfirmacion(
    '¿Cancelar recurrencia?',
    `Se cancelarán todas las reservas futuras de <strong>"${escaparHTML(solicitud.nombre_recurso)}"</strong> para el usuario <strong>${escaparHTML(solicitud.nombre_usuario)}</strong>.`,
    async () => {
      showToast('info', 'Cancelando recurrencia...');

      try {
        const result = await new Promise((resolve, reject) => {
          google.script.run
            .withSuccessHandler((res) => resolve(res || { success: false, error: 'Respuesta vacía' }))
            .withFailureHandler(reject)
            .cancelarRecurrenciaAprobada(idSolicitud);
        });

        if (result && result.success) {
          showToast('success', result.message || 'Recurrencia cancelada');
          await cargarSolicitudesRecurrentes();
          adminHaCambiadoDatos = true;
        } else {
          showToast('error', result?.error || 'Error al cancelar');
        }
      } catch (error) {
        console.error('Error cancelando recurrencia:', error);
        showToast('error', 'Error: ' + (error.message || error));
      }
    }
  );
}

/**
 * Abre modal para editar tramos de una recurrencia aprobada
 */
function abrirModalEditarTramosRecurrencia(idSolicitud) {
  const solicitud = AdminState.solicitudesRecurrentes.find(s => s.id_solicitud === idSolicitud);
  if (!solicitud) {
    showToast('error', 'Solicitud no encontrada');
    return;
  }

  // Parsear los tramos actuales
  const diasSemanaStr = solicitud.dias_semana || '';
  const tramosActuales = [];

        </div>

      </label>

  // Crear modal
  let modal = document.getElementById('modalEditarTramosRecurrencia');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'modalEditarTramosRecurrencia';
    document.body.appendChild(modal);
  }

  modal.className = 'fixed inset-0 z-[10000] flex items-center justify-center bg-gray-900/60 backdrop-blur-sm p-4';
  modal.innerHTML = `
    <div class="bg-white rounded-xl shadow-2xl max-w-md w-full max-h-[90vh] overflow-hidden flex flex-col animate-in zoom-in-95 fade-in duration-200">
      <!-- Header -->
      <div class="bg-blue-50 border-b border-blue-100 px-5 py-4 flex items-center gap-3">
        <div class="p-2 rounded-lg bg-blue-100 text-blue-600">
          <iconify-icon icon="mdi:calendar-edit" class="text-2xl"></iconify-icon>
        </div>
        <div class="flex-1 min-w-0">
          <h3 class="text-lg font-bold text-gray-900">Editar Tramos</h3>
          <p class="text-sm text-gray-600 truncate">${escaparHTML(solicitud.nombre_recurso)} - ${escaparHTML(solicitud.nombre_usuario)}</p>
        </div>
        <button onclick="cerrarModalEditarTramosRecurrencia()" class="p-2 hover:bg-blue-100 rounded-lg transition-colors">
          <iconify-icon icon="mdi:close" class="text-xl text-gray-400"></iconify-icon>
        </button>
      </div>

      <!-- Body -->
      <div class="p-5 overflow-y-auto flex-1">
        <div class="bg-amber-50 border border-amber-200 rounded-lg p-3 mb-4">
          <div class="flex items-start gap-2">
            <iconify-icon icon="mdi:information" class="text-amber-600 text-lg mt-0.5 shrink-0"></iconify-icon>
            <p class="text-sm text-amber-800">
              Desmarca los tramos que quieras eliminar. Las reservas futuras de esos tramos serán canceladas y el usuario será notificado.
            </p>
          </div>
        </div>

        <div class="space-y-2" id="listaTramosEditar">
          ${tramosHTML}
        </div>

        <div id="contadorTramosSeleccionados" class="mt-3 text-center text-sm text-gray-500">
          ${tramosActuales.length} de ${tramosActuales.length} tramos seleccionados
        </div>
      </div>

      <!-- Footer -->
      <div class="bg-gray-50 border-t border-gray-200 px-5 py-4 flex gap-3">
        <button onclick="cerrarModalEditarTramosRecurrencia()"
          class="flex-1 px-4 py-2.5 bg-white border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 font-medium transition-colors">
          Cancelar
        </button>
        <button onclick="guardarEdicionTramosRecurrencia('${idSolicitud}')" id="btnGuardarTramosRecurrencia"
          class="flex-1 px-4 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium transition-colors flex items-center justify-center gap-2">
          <iconify-icon icon="mdi:content-save"></iconify-icon>
          Guardar cambios
        </button>
      </div>
    </div>
  `;

  // Añadir listeners para actualizar contador
  modal.querySelectorAll('.checkbox-tramo').forEach(cb => {
    cb.addEventListener('change', actualizarContadorTramosEditar);
  });
}

function actualizarContadorTramosEditar() {
  const total = document.querySelectorAll('#listaTramosEditar .checkbox-tramo').length;
  const seleccionados = document.querySelectorAll('#listaTramosEditar .checkbox-tramo:checked').length;
  const contador = document.getElementById('contadorTramosSeleccionados');
  const btnGuardar = document.getElementById('btnGuardarTramosRecurrencia');

  if (contador) {
    contador.textContent = `${seleccionados} de ${total} tramos seleccionados`;

    if (seleccionados === 0) {
      contador.classList.add('text-red-500');
      contador.classList.remove('text-gray-500');
    } else {
      contador.classList.remove('text-red-500');
      contador.classList.add('text-gray-500');
    }
  }

  // Deshabilitar botón si no hay tramos seleccionados
  if (btnGuardar) {
    btnGuardar.disabled = seleccionados === 0;
    if (seleccionados === 0) {
      btnGuardar.classList.add('opacity-50', 'cursor-not-allowed');
    } else {
      btnGuardar.classList.remove('opacity-50', 'cursor-not-allowed');
    }
  }
}

function cerrarModalEditarTramosRecurrencia() {
  const modal = document.getElementById('modalEditarTramosRecurrencia');
  if (modal) modal.remove();
}

async function guardarEdicionTramosRecurrencia(idSolicitud) {
  // Obtener tramos seleccionados (los que quedan)
  const tramosRestantes = [];
  document.querySelectorAll('#listaTramosEditar .tramo-editable').forEach(label => {
    const checkbox = label.querySelector('.checkbox-tramo');
    if (checkbox && checkbox.checked) {
      tramosRestantes.push({
        dia: label.dataset.dia,
        tramo: label.dataset.tramo
      });
    }
  });

  // Obtener tramos originales
  const solicitud = AdminState.solicitudesRecurrentes.find(s => s.id_solicitud === idSolicitud);
  if (!solicitud) {
    showToast('error', 'Solicitud no encontrada');
    return;
  }

  const diasSemanaStr = solicitud.dias_semana || '';
  const tramosOriginales = [];
  diasSemanaStr.split(',').forEach(item => {
    const [dia, tramo] = item.trim().split(':');
    if (dia && tramo) {
      tramosOriginales.push({ dia: dia.toUpperCase(), tramo: tramo.trim() });
    }
  });

  // Verificar si hay cambios
  if (tramosRestantes.length === tramosOriginales.length) {
    showToast('info', 'No hay cambios para guardar');
    cerrarModalEditarTramosRecurrencia();
    return;
  }

  // Calcular tramos eliminados
  const tramosEliminados = tramosOriginales.filter(orig =>
    !tramosRestantes.some(rest => rest.dia === orig.dia && rest.tramo === orig.tramo)
  );

  // Confirmar
  const diasNombres = { 'L': 'Lunes', 'M': 'Martes', 'X': 'Miércoles', 'J': 'Jueves', 'V': 'Viernes' };
  const eliminadosTexto = tramosEliminados.map(t => {
    const tramoInfo = AdminState.tramos?.find(tr => tr.id_tramo === t.tramo);
    return `${diasNombres[t.dia] || t.dia} (${tramoInfo?.nombre_tramo || t.tramo})`;
  }).join(', ');

  cerrarModalEditarTramosRecurrencia();

  mostrarConfirmacion(
    '¿Confirmar cambios?',
    `Se eliminarán los siguientes tramos: <strong>${eliminadosTexto}</strong>.<br><br>Las reservas futuras de estos tramos serán canceladas y el usuario recibirá una notificación.`,
    async () => {
      showLoading();

      try {
        const result = await new Promise((resolve, reject) => {
          google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(reject)
            .editarTramosRecurrencia(idSolicitud, tramosRestantes, tramosEliminados);
        });

        hideLoading();

        if (result && result.success) {
          showToast('success', result.message || 'Tramos actualizados correctamente');
          await cargarSolicitudesRecurrentes();
          adminHaCambiadoDatos = true;
        } else {
          showToast('error', result?.error || 'Error al actualizar tramos');
        }
      } catch (error) {
        hideLoading();
        console.error('Error editando tramos:', error);
        showToast('error', 'Error: ' + (error.message || error));
      }
    }
  );
}

/**
 * Renderiza las solicitudes recurrentes según el filtro activo
 */
function renderizarSolicitudesRecurrentes() {
  const container = document.getElementById('listaSolicitudesRecurrentes');
  if (!container) return;

  let solicitudes = [...AdminState.solicitudesRecurrentes];

  // Aplicar filtro de estado
  if (filtroEstadoRecurrente !== 'todas') {
    solicitudes = solicitudes.filter(s =>
      (s.estado || '').toLowerCase() === filtroEstadoRecurrente.toLowerCase()
    );
  }

  // Aplicar filtro de búsqueda
  if (busquedaRecurrente) {
    solicitudes = solicitudes.filter(s => {
      const texto = [
        s.nombre_recurso,
        s.nombre_usuario,
        s.email_usuario,
        s.motivo,
        s.nombre_tramo
      ].filter(Boolean).join(' ').toLowerCase();
      return texto.includes(busquedaRecurrente);
    });
  }

  // Actualizar visibilidad del botón "Aprobar todas"
  const btnAprobarTodas = document.getElementById('btnAprobarTodasPendientes');
  if (btnAprobarTodas) {
    const pendientesCount = AdminState.solicitudesRecurrentes.filter(s =>
      (s.estado || '').toLowerCase() === 'pendiente'
    ).length;
    btnAprobarTodas.style.display = pendientesCount > 0 ? 'flex' : 'none';
  }

  if (solicitudes.length === 0) {
    const mensajes = {
      'pendiente': 'No hay solicitudes pendientes de revisión',
      'aprobada': 'No hay solicitudes aprobadas',
      'rechazada': 'No hay solicitudes rechazadas',
      'todas': 'No hay solicitudes registradas'
    };
    container.innerHTML = `
      <div class="text-center py-8 text-gray-500">
        <iconify-icon icon="mdi:calendar-check" class="text-4xl mb-2"></iconify-icon>
        <p>${busquedaRecurrente ? 'No se encontraron resultados para la búsqueda' : (mensajes[filtroEstadoRecurrente] || 'No hay solicitudes')}</p>
      </div>
    `;
    return;
  }

  // Ordenar por fecha (más recientes primero)
  solicitudes.sort((a, b) => new Date(b.fecha_solicitud) - new Date(a.fecha_solicitud));

  // Función para obtener el icono del recurso
  const getIconoRecurso = (idRecurso) => {
    const recurso = AdminState.recursos?.find(r => r.id_recurso === idRecurso);
    return recurso?.icono || 'mdi:cube-outline';
  };

  container.innerHTML = solicitudes.map(sol => {
    const estadoConfig = {
      'pendiente': { bg: 'bg-amber-100', text: 'text-amber-800', icon: 'mdi:clock-outline' },
      'aprobada': { bg: 'bg-green-100', text: 'text-green-800', icon: 'mdi:check-circle' },
      'rechazada': { bg: 'bg-red-100', text: 'text-red-800', icon: 'mdi:close-circle' }
    };
    const config = estadoConfig[(sol.estado || '').toLowerCase()] || { bg: 'bg-gray-100', text: 'text-gray-800', icon: 'mdi:help-circle' };

    // Parsear días y tramos (soporta formato nuevo "V:T001,L:T002" y antiguo "L,M,X")
    const diasSemanaStr = sol.dias_semana || '';
    let diasUnicos = [];
    let tramosUnicos = [];

    if (diasSemanaStr.includes(':')) {
      // Formato nuevo: "V:T001,V:T002,L:T001"
      const items = diasSemanaStr.split(',');
      const diasSet = new Set();
      const tramosSet = new Set();
      items.forEach(item => {
        const [dia, tramo] = item.trim().split(':');
        if (dia) diasSet.add(dia.toUpperCase());
        if (tramo) tramosSet.add(tramo);
      });
      diasUnicos = Array.from(diasSet);
      tramosUnicos = Array.from(tramosSet);
    } else {
      // Formato antiguo: "L,M,X"
      diasUnicos = diasSemanaStr.split(',').map(d => d.trim().toUpperCase()).filter(Boolean);
      if (sol.id_tramo) tramosUnicos = [sol.id_tramo];
    }

    const diasNombres = { 'L': 'L', 'M': 'M', 'X': 'X', 'J': 'J', 'V': 'V', 'S': 'S', 'D': 'D' };
    const diasFormateados = diasUnicos.map(d => diasNombres[d] || d).join('·');

    // Buscar nombres de tramos
    const tramosNombres = tramosUnicos.map(idTramo => {
      const tramo = AdminState.tramos?.find(t => t.id_tramo === idTramo);
      return tramo?.nombre_tramo || idTramo;
    });
    const tramosDisplay = tramosNombres.length > 2
      ? `${tramosNombres.slice(0, 2).join(', ')} +${tramosNombres.length - 2}`
      : tramosNombres.join(', ') || sol.nombre_tramo || '-';

    const fechaInicio = sol.fecha_inicio ? new Date(sol.fecha_inicio).toLocaleDateString('es-ES', { day: '2-digit', month: 'short' }) : '-';
    const fechaFin = sol.fecha_fin ? new Date(sol.fecha_fin).toLocaleDateString('es-ES', { day: '2-digit', month: 'short' }) : '-';

    const icono = getIconoRecurso(sol.id_recurso);
    const esPendiente = (sol.estado || '').toLowerCase() === 'pendiente';

    return `
      <div class="bg-white border border-gray-200 rounded-lg p-3 hover:shadow-md transition-shadow cursor-pointer group"
           onclick="verDetalleSolicitud('${sol.id_solicitud}')">
        <div class="flex items-center gap-3">
          <!-- Icono del recurso -->
          <div class="w-10 h-10 rounded-lg bg-blue-50 flex items-center justify-center flex-shrink-0 group-hover:bg-blue-100 transition-colors">
            <iconify-icon icon="${escaparHTML(icono)}" class="text-xl text-blue-600"></iconify-icon>
          </div>

          <!-- Info principal -->
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 flex-wrap">
              <span class="font-semibold text-gray-900 truncate">${escaparHTML(sol.nombre_recurso)}</span>
              <span class="px-1.5 py-0.5 text-xs font-medium rounded ${config.bg} ${config.text} flex items-center gap-0.5">
                <iconify-icon icon="${config.icon}" class="text-xs"></iconify-icon>
                ${escaparHTML(sol.estado)}
              </span>
            </div>
            <div class="text-xs text-gray-500 flex items-center gap-2 mt-0.5 flex-wrap">
              <span class="flex items-center gap-1">
                <iconify-icon icon="mdi:account" class="text-sm"></iconify-icon>
                ${escaparHTML(sol.nombre_usuario)}
              </span>
              <span class="text-gray-300">|</span>
              <span class="font-medium">${escaparHTML(diasFormateados)}</span>
              <span class="text-gray-300">|</span>
              <span title="${escaparHTML(tramosNombres.join(', '))}">${escaparHTML(tramosDisplay)}</span>
              <span class="text-gray-300">|</span>
              <span>${fechaInicio} → ${fechaFin}</span>
            </div>
          </div>

          <!-- Botones -->
          <div class="flex items-center gap-1 flex-shrink-0" onclick="event.stopPropagation()">
            ${esPendiente ? `
              <button onclick="abrirModalGestionarSolicitud('${sol.id_solicitud}')"
                class="px-3 py-1.5 text-xs font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors">
                Gestionar
              </button>
            ` : ''}
            ${(sol.estado || '').toLowerCase() === 'aprobada' ? `
              <button onclick="abrirModalEditarTramosRecurrencia('${sol.id_solicitud}')"
                class="px-3 py-1.5 text-xs font-medium text-blue-600 hover:text-white hover:bg-blue-600 border border-blue-200 rounded-lg transition-colors"
                title="Editar tramos de esta recurrencia">
                Editar
              </button>
              <button onclick="cancelarRecurrenciaAprobada('${sol.id_solicitud}')"
                class="px-3 py-1.5 text-xs font-medium text-red-600 hover:text-white hover:bg-red-600 border border-red-200 rounded-lg transition-colors">
                Cancelar
              </button>
            ` : ''}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

/**
 * Abre el modal para gestionar (aprobar/rechazar) una solicitud
 */
function abrirModalGestionarSolicitud(idSolicitud) {
  // Buscar en múltiples fuentes de datos
  let solicitud = AdminState.solicitudesRecurrentes?.find(s => s.id_solicitud === idSolicitud);

  // Si no está en AdminState, buscar en DispState (datos de la matriz)
  if (!solicitud && DispState.recurrencias) {
    solicitud = DispState.recurrencias.find(s => s.id_solicitud === idSolicitud);
  }
  if (!solicitud && DispState.pendientes) {
    solicitud = DispState.pendientes.find(s => s.id_solicitud === idSolicitud);
  }
  // Buscar también en el historial si está cargado
  if (!solicitud && typeof datosHistorialRecurrencias !== 'undefined' && datosHistorialRecurrencias) {
    solicitud = datosHistorialRecurrencias.find(s => s.id_solicitud === idSolicitud);
  }

  if (!solicitud) {
    showToast('error', 'Solicitud no encontrada');
    return;
  }

  document.getElementById('gestionarSolicitudId').value = idSolicitud;
  document.getElementById('gestionarSolicitudNotas').value = '';
  document.getElementById('gestionarSolicitudMotivo').value = '';

  // Mostrar info de la solicitud - Parsear días y tramos
  const diasSemanaStr = solicitud.dias_semana || '';
  const diasNombres = { 'L': 'Lunes', 'M': 'Martes', 'X': 'Miércoles', 'J': 'Jueves', 'V': 'Viernes', 'S': 'Sábado', 'D': 'Domingo' };
  let diasFormateados = '';
  let tramosFormateados = '';

  if (diasSemanaStr.includes(':')) {
    const items = diasSemanaStr.split(',');
    const diasSet = new Set();
    const tramosSet = new Set();
    items.forEach(item => {
      const [dia, tramo] = item.trim().split(':');
      if (dia) diasSet.add(dia.toUpperCase());
      if (tramo) tramosSet.add(tramo);
    });
    diasFormateados = Array.from(diasSet).map(d => diasNombres[d] || d).join(', ');
    const tramosConNombre = Array.from(tramosSet).map(idTramo => {
      const tramo = AdminState.tramos?.find(t => t.id_tramo === idTramo);
      return tramo?.nombre_tramo || idTramo;
    });
    tramosFormateados = tramosConNombre.join(', ');
  } else {
    diasFormateados = diasSemanaStr.split(',').map(d => diasNombres[d.trim().toUpperCase()] || d).join(', ');
    tramosFormateados = solicitud.nombre_tramo || '-';
  }

  document.getElementById('gestionarSolicitudInfo').innerHTML = `
    <div class="space-y-2 text-sm">
      <p><span class="font-medium text-gray-700">Recurso:</span> ${escaparHTML(solicitud.nombre_recurso)}</p>
      <p><span class="font-medium text-gray-700">Solicitante:</span> ${escaparHTML(solicitud.nombre_usuario)}</p>
      <p><span class="font-medium text-gray-700">Días:</span> ${escaparHTML(diasFormateados)}</p>
      <p><span class="font-medium text-gray-700">Tramos:</span> ${escaparHTML(tramosFormateados)}</p>
      <p><span class="font-medium text-gray-700">Período:</span> ${new Date(solicitud.fecha_inicio).toLocaleDateString('es-ES')} → ${new Date(solicitud.fecha_fin).toLocaleDateString('es-ES')}</p>
      <p><span class="font-medium text-gray-700">Motivo:</span> ${escaparHTML(solicitud.motivo)}</p>
    </div>
  `;

  const modal = document.getElementById('modalGestionarSolicitud');
  // Mover modal al body para que el overlay cubra toda la pantalla
  if (modal.parentElement !== document.body) {
    document.body.appendChild(modal);
  }
  modal.classList.remove('hidden');
}

function cerrarModalGestionarSolicitud() {
  const modal = document.getElementById('modalGestionarSolicitud');
  modal.classList.add('hidden');
}

/**
 * Aprueba una solicitud recurrente
 */
async function aprobarSolicitudRecurrente() {
  const idSolicitud = document.getElementById('gestionarSolicitudId').value;
  const notas = document.getElementById('gestionarSolicitudNotas').value.trim();

  const btnAprobar = document.getElementById('btnAprobarSolicitud');
  const btnRechazar = document.getElementById('btnRechazarSolicitud');
  if (!btnAprobar) {
    showToast('error', 'Error interno: botón no encontrado');
    return;
  }

  const textoOriginal = btnAprobar.innerHTML;
  btnAprobar.disabled = true;
  if (btnRechazar) btnRechazar.disabled = true;
  btnAprobar.innerHTML = '<span class="animate-spin inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full mr-2"></span>Aprobando...';

  try {
    const result = await new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler((res) => resolve(res || { success: false, error: 'Respuesta vacía del servidor' }))
        .withFailureHandler(reject)
        .aprobarSolicitudRecurrente(idSolicitud, notas);
    });

    // Restaurar botones siempre
    btnAprobar.disabled = false;
    btnAprobar.innerHTML = textoOriginal;
    if (btnRechazar) btnRechazar.disabled = false;

    if (result && result.success) {
      showToast('success', `Solicitud aprobada. Se crearon ${result.reservasCreadas || 0} reservas.`);
      cerrarModalGestionarSolicitud();
      await cargarSolicitudesRecurrentes();
      adminHaCambiadoDatos = true;
    } else {
      showToast('error', result?.error || 'Error al aprobar');
    }
  } catch (error) {
    console.error('Error al aprobar:', error);
    showToast('error', 'Error al aprobar la solicitud: ' + (error.message || error));
    btnAprobar.disabled = false;
    btnAprobar.innerHTML = textoOriginal;
    if (btnRechazar) btnRechazar.disabled = false;
  }
}

/**
 * Rechaza una solicitud recurrente
 */

  const idSolicitud = document.getElementById('gestionarSolicitudId').value;

    showToast('error', 'Error interno: botón no encontrado');
    return;
  }

  const textoOriginal = btnRechazar.innerHTML;
  btnRechazar.disabled = true;
  btnRechazar.innerHTML = '<span class="animate-spin inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full mr-2"></span>Rechazando...';

  try {
    const result = await new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler((res) => resolve(res || { success: false, error: 'Respuesta vacía del servidor' }))
        .withFailureHandler(reject)
        .rechazarSolicitudRecurrente(idSolicitud, motivo);
    });

    if (result && result.success) {
      showToast('success', 'Solicitud rechazada correctamente');
      cerrarModalGestionarSolicitud();
      await cargarSolicitudesRecurrentes();
    } else {
      showToast('error', result?.error || 'Error al rechazar');
      btnRechazar.disabled = false;
      btnRechazar.innerHTML = textoOriginal;
    }
  } catch (error) {
    console.error('Error al rechazar:', error);
    showToast('error', 'Error al rechazar la solicitud: ' + (error.message || error));
    btnRechazar.disabled = false;
    btnRechazar.innerHTML = textoOriginal;
  }
}

/**
 * Muestra detalle de una solicitud (histórico)
 */
function verDetalleSolicitud(idSolicitud) {
  const solicitud = AdminState.solicitudesRecurrentes.find(s => s.id_solicitud === idSolicitud);
  if (!solicitud) {
    showToast('error', 'Solicitud no encontrada');
    return;
  }

  // Parsear días y tramos (soporta formato nuevo "V:T001,L:T002" y antiguo "L,M,X")
  const diasSemanaStr = solicitud.dias_semana || '';
  const diasNombres = { 'L': 'Lunes', 'M': 'Martes', 'X': 'Miércoles', 'J': 'Jueves', 'V': 'Viernes', 'S': 'Sábado', 'D': 'Domingo' };
  let diasFormateados = '';
  let tramosFormateados = '';

  if (diasSemanaStr.includes(':')) {
    // Formato nuevo: "V:T001,V:T002,L:T001"
    const items = diasSemanaStr.split(',');
    const diasSet = new Set();
    const tramosSet = new Set();
    items.forEach(item => {
      const [dia, tramo] = item.trim().split(':');
      if (dia) diasSet.add(dia.toUpperCase());
      if (tramo) tramosSet.add(tramo);
    });
    diasFormateados = Array.from(diasSet).map(d => diasNombres[d] || d).join(', ');

    // Buscar nombres de tramos
    const tramosConNombre = Array.from(tramosSet).map(idTramo => {
      const tramo = AdminState.tramos?.find(t => t.id_tramo === idTramo);
      return tramo?.nombre_tramo || idTramo;
    });
    tramosFormateados = tramosConNombre.join(', ');
  } else {
    // Formato antiguo: "L,M,X"
    diasFormateados = diasSemanaStr.split(',').map(d => diasNombres[d.trim().toUpperCase()] || d).join(', ');
    tramosFormateados = solicitud.nombre_tramo || '-';
  }

  const estadoClasses = {
    'pendiente': 'text-amber-600',
    'aprobada': 'text-green-600',
    'rechazada': 'text-red-600'
  };
  const estadoClass = estadoClasses[(solicitud.estado || '').toLowerCase()] || 'text-gray-600';

  let html = `
    <div class="space-y-3">
      <div class="flex items-center gap-2">
        <span class="font-bold text-lg">${escaparHTML(solicitud.nombre_recurso)}</span>
        <span class="font-semibold ${estadoClass}">(${escaparHTML(solicitud.estado)})</span>
      </div>
      <hr>
      <p><strong>ID:</strong> ${escaparHTML(solicitud.id_solicitud)}</p>
      <p><strong>Solicitante:</strong> ${escaparHTML(solicitud.nombre_usuario)} (${escaparHTML(solicitud.email_usuario)})</p>
      <p><strong>Días:</strong> ${escaparHTML(diasFormateados)}</p>
      <p><strong>Tramos:</strong> ${escaparHTML(tramosFormateados)}</p>
      <p><strong>Período:</strong> ${new Date(solicitud.fecha_inicio).toLocaleDateString('es-ES')} → ${new Date(solicitud.fecha_fin).toLocaleDateString('es-ES')}</p>
      <p><strong>Motivo:</strong> ${escaparHTML(solicitud.motivo || 'No especificado')}</p>
      <p><strong>Fecha solicitud:</strong> ${new Date(solicitud.fecha_solicitud).toLocaleString('es-ES')}</p>
      ${solicitud.fecha_resolucion ? `<p><strong>Fecha resolución:</strong> ${new Date(solicitud.fecha_resolucion).toLocaleString('es-ES')}</p>` : ''}
      ${solicitud.admin_resolutor ? `<p><strong>Gestionado por:</strong> ${escaparHTML(solicitud.admin_resolutor)}</p>` : ''}
      ${solicitud.notas_admin ? `<p><strong>Notas admin:</strong> ${escaparHTML(solicitud.notas_admin)}</p>` : ''}
    </div>
  `;

  // Usar un modal simple o alert
  const modal = document.createElement('div');
  modal.className = 'fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4';
  modal.innerHTML = `
    <div class="bg-white rounded-xl shadow-xl max-w-lg w-full p-6 max-h-[80vh] overflow-y-auto">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-bold text-gray-900">Detalle de Solicitud</h3>
        <button onclick="this.closest('.fixed').remove()" class="text-gray-400 hover:text-gray-600">
          <iconify-icon icon="mdi:close" class="text-xl"></iconify-icon>
        </button>
      </div>
      ${html}
      <div class="mt-6 text-right">
        <button onclick="this.closest('.fixed').remove()"
          class="px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg">
          Cerrar
        </button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
}

// Variables para calendario de recurrente admin
let seleccionesRecurrenteAdmin = new Set();
let conflictosRecurrenteAdmin = { recurrenciasOcupadas: [], nodisponibles: [] };
const DIAS_RECURRENTES_ADMIN = ['L', 'M', 'X', 'J', 'V'];

/**
 * Carga los conflictos para un recurso específico
 */
async function cargarConflictosRecurso(idRecurso) {
  const spinnerAdmin = document.getElementById('spinnerConflictosAdmin');

  if (!idRecurso) {
    conflictosRecurrenteAdmin = { recurrenciasOcupadas: [], nodisponibles: [] };
    generarMatrizRecurrenteAdmin();
    return;
  }

  // Mostrar spinner
  if (spinnerAdmin) spinnerAdmin.classList.remove('hidden');

  try {
    const result = await new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)
        .getConflictosRecurrencia(idRecurso);
    });

    if (result && result.success) {
      conflictosRecurrenteAdmin = {
        recurrenciasOcupadas: result.recurrenciasOcupadas || [],
        nodisponibles: result.nodisponibles || []
      };
    } else {
      conflictosRecurrenteAdmin = { recurrenciasOcupadas: [], nodisponibles: [] };
    }
  } catch (error) {
    console.error('Error cargando conflictos:', error);
    conflictosRecurrenteAdmin = { recurrenciasOcupadas: [], nodisponibles: [] };
  }

  // Ocultar spinner
  if (spinnerAdmin) spinnerAdmin.classList.add('hidden');

  // Limpiar selecciones previas y regenerar matriz
  seleccionesRecurrenteAdmin.clear();
  generarMatrizRecurrenteAdmin();
  actualizarContadorRecurrenteAdmin();
}

/**
 * Genera la matriz del calendario semanal para admin
 */
function generarMatrizRecurrenteAdmin() {
  const tbody = document.getElementById('cuerpoMatrizRecurrenteAdmin');
  if (!tbody || !AdminState.tramos) return;

  tbody.innerHTML = '';

  // Ordenar tramos por hora de inicio
  const tramosOrdenados = [...AdminState.tramos].sort((a, b) =>
    (a.hora_inicio || '').localeCompare(b.hora_inicio || '')
  );

  tramosOrdenados.forEach(tramo => {
    const tr = document.createElement('tr');
    tr.className = 'hover:bg-gray-50/50';

    // Celda del tramo
    tr.innerHTML = `
      <td class="px-2 py-1.5 border-r border-gray-200 bg-gray-50">
        <div class="text-xs font-bold text-gray-700">${escaparHTML(tramo.nombre_tramo)}</div>
        <div class="text-[10px] text-gray-400">${tramo.hora_inicio} - ${tramo.hora_fin}</div>
      </td>
    `;

    // Celdas de días
    DIAS_RECURRENTES_ADMIN.forEach(dia => {
      const td = document.createElement('td');
      const celdaId = `${tramo.id_tramo}-${dia}`;
      td.id = `celda-rec-admin-${celdaId}`;

      // Verificar si está ocupada por recurrencia
      const ocupadaPor = conflictosRecurrenteAdmin.recurrenciasOcupadas.find(
        c => c.dia === dia && c.tramo === tramo.id_tramo
      );

      // Verificar si no está disponible
      const noDisponible = conflictosRecurrenteAdmin.nodisponibles.find(
        c => c.dia === dia && c.tramo === tramo.id_tramo
      );

      if (ocupadaPor) {
        // Celda ocupada por otra recurrencia (ROJO)
        td.className = 'p-1 border border-red-200 h-10 text-center bg-red-100 cursor-not-allowed';
        td.innerHTML = `<div class="w-full h-full flex items-center justify-center" title="Ocupado por: ${escaparHTML(ocupadaPor.usuario)}">
          <iconify-icon icon="mdi:account-clock" class="text-red-500 text-sm"></iconify-icon>
        </div>`;
        td.title = `Ocupado por: ${ocupadaPor.usuario}`;
      } else if (noDisponible) {
        // Celda no disponible (GRIS)
        td.className = 'p-1 border border-gray-200 h-10 text-center bg-gray-200 cursor-not-allowed';
        td.innerHTML = `<div class="w-full h-full flex items-center justify-center" title="${escaparHTML(noDisponible.razon || 'No disponible')}">
          <iconify-icon icon="mdi:block-helper" class="text-gray-400 text-sm"></iconify-icon>
        </div>`;
        td.title = noDisponible.razon || 'No disponible';
      } else {
        // Celda disponible (normal)
        td.className = 'p-1 border border-gray-100 h-10 text-center transition-all duration-200 cursor-pointer hover:bg-blue-50';
        td.innerHTML = `<div class="w-full h-full flex items-center justify-center"></div>`;
        td.onclick = () => toggleCeldaRecurrenteAdmin(tramo.id_tramo, dia);
      }

      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });
}

/**
 * Toggle selección de celda
 */
function toggleCeldaRecurrenteAdmin(idTramo, dia) {
  const celdaId = `${idTramo}-${dia}`;
  const celda = document.getElementById(`celda-rec-admin-${celdaId}`);
  if (!celda) return;

  // Verificar que no esté bloqueada
  const ocupada = conflictosRecurrenteAdmin.recurrenciasOcupadas.find(
    c => c.dia === dia && c.tramo === idTramo
  );
  const noDisponible = conflictosRecurrenteAdmin.nodisponibles.find(
    c => c.dia === dia && c.tramo === idTramo
  );

  if (ocupada || noDisponible) {
    // No permitir seleccionar celdas bloqueadas
    return;
  }

  if (seleccionesRecurrenteAdmin.has(celdaId)) {
    seleccionesRecurrenteAdmin.delete(celdaId);
    celda.className = 'p-1 border border-gray-100 h-10 text-center transition-all duration-200 cursor-pointer hover:bg-blue-50';
    celda.innerHTML = `<div class="w-full h-full flex items-center justify-center"></div>`;
  } else {
    seleccionesRecurrenteAdmin.add(celdaId);
    celda.className = 'p-1 border border-blue-300 h-10 text-center transition-all duration-200 cursor-pointer bg-blue-500';
    celda.innerHTML = `<div class="w-full h-full flex items-center justify-center"><iconify-icon icon="mdi:check" class="text-white text-lg"></iconify-icon></div>`;
  }

  actualizarContadorRecurrenteAdmin();
}

/**
 * Actualiza el contador de selecciones
 */
function actualizarContadorRecurrenteAdmin() {
  const contador = document.getElementById('contadorSeleccionRecurrenteAdmin');
  if (!contador) return;

  const num = seleccionesRecurrenteAdmin.size;
  contador.textContent = num === 0 ? '0 tramos seleccionados' :
    num === 1 ? '1 tramo seleccionado' : `${num} tramos seleccionados`;
  contador.className = num > 0 ?
    'mt-2 text-center text-xs font-medium text-blue-600' :
    'mt-2 text-center text-xs text-gray-500';
}

/**
 * Guarda una reserva recurrente directa (sin solicitud previa)
 */
async function guardarRecurrenteDirecta() {
  const recurso = document.getElementById('recDirectaRecurso').value;
  const usuario = document.getElementById('recDirectaUsuario').value;
  const notas = document.getElementById('recDirectaNotas').value.trim();

  // Obtener selecciones del calendario (formato: "L:T001,M:T002")
  const seleccionesArray = Array.from(seleccionesRecurrenteAdmin).map(sel => {
    const [idTramo, dia] = sel.split('-');
    return `${dia}:${idTramo}`;
  });

  // Determinar fecha fin
  const tipoFin = document.querySelector('input[name="recDirectaTipoFin"]:checked')?.value;
  let fechaFin = '';
  if (tipoFin === 'fecha') {
    fechaFin = document.getElementById('recDirectaFechaFin').value;
    if (!fechaFin) return showToast('error', 'Indica la fecha de fin');
  } else {
    // Fin de curso - usar fecha de la config o 30 junio
    const config = AdminState.config || [];
    const finCursoConfig = config.find(c => c.clave === 'FECHA_FIN_CURSO');
    fechaFin = finCursoConfig?.valor || `${new Date().getFullYear()}-06-30`;
  }

  // Validaciones
  if (!recurso) return showToast('error', 'Selecciona un recurso');
  if (!usuario) return showToast('error', 'Selecciona un usuario');
  if (seleccionesArray.length === 0) return showToast('error', 'Selecciona al menos un tramo en el calendario');

  const btn = document.getElementById('btnGuardarRecurrenteDirecta');
  const textoOriginal = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span class="animate-spin inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full mr-2"></span>Generando...';

  try {
    const datos = {
      id_recurso: recurso,
      email_usuario: usuario,
      dias_semana: seleccionesArray.join(','), // Formato: "L:T001,M:T002"
      fecha_inicio: new Date().toISOString().split('T')[0], // Siempre desde hoy
      fecha_fin: fechaFin,
      notas_admin: notas
    };

    const result = await new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler((res) => resolve(res || { success: false, error: 'Respuesta vacía' }))
        .withFailureHandler(reject)
        .crearRecurrenteDirecta(datos);
    });

    btn.disabled = false;
    btn.innerHTML = textoOriginal;

    if (result && result.success) {
      showToast('success', `Reservas generadas: ${result.reservasCreadas || result.reservasGeneradas || 0}`);
      cerrarModalRecurrenteDirecta();
      await cargarSolicitudesRecurrentes();
      adminHaCambiadoDatos = true;
    } else {
      showToast('error', result?.error || 'Error al crear reservas');
    }
  } catch (error) {
    console.error('Error al crear recurrente directa:', error);
    showToast('error', 'Error: ' + (error.message || error));
    btn.disabled = false;
    btn.innerHTML = textoOriginal;
  }
}

function renderizarHistorialRecurrencias() {
  const container = document.getElementById('listaHistorialRecurrencias');
  if (!container) return;

  let solicitudes = [...datosHistorialRecurrencias];

  // Filtrar por estado adicional si hay filtro activo
  if (filtroHistorialActual !== 'todas') {
    solicitudes = solicitudes.filter(s =>
      (s.estado || '').toLowerCase() === filtroHistorialActual.toLowerCase()
    );
  }

  // Filtrar por búsqueda
  const busqueda = (document.getElementById('busquedaHistorial')?.value || '').toLowerCase();
  if (busqueda) {
    solicitudes = solicitudes.filter(s => {
      const texto = [s.nombre_recurso, s.nombre_usuario, s.email_usuario, s.motivo].filter(Boolean).join(' ').toLowerCase();
      return texto.includes(busqueda);
    });
  }

  // Ordenar por fecha (más recientes primero)
  solicitudes.sort((a, b) => new Date(b.fecha_solicitud) - new Date(a.fecha_solicitud));

  if (solicitudes.length === 0) {
    container.innerHTML = `
      <div class="text-center py-8 text-gray-400">
        <iconify-icon icon="mdi:calendar-blank" class="text-3xl"></iconify-icon>
        <p class="mt-2 text-sm">${busqueda ? 'No se encontraron resultados' : 'No hay solicitudes'}</p>
      </div>
    `;
    return;
  }

  const estadoConfig = {
    'pendiente': { bg: 'bg-amber-100', text: 'text-amber-800', icon: 'mdi:clock-outline' },
    'aprobada': { bg: 'bg-green-100', text: 'text-green-800', icon: 'mdi:check-circle' },
    'rechazada': { bg: 'bg-red-100', text: 'text-red-800', icon: 'mdi:close-circle' },
    'cancelada': { bg: 'bg-gray-100', text: 'text-gray-600', icon: 'mdi:cancel' }
  };

  // Helper para obtener nombre corto del tramo
  const getNombreTramoCorto = (idTramo) => {
    const tramo = AdminState.tramos?.find(t => t.id_tramo === idTramo);
    return tramo?.Nombre_Tramo || tramo?.nombre_tramo || idTramo;
  };

  container.innerHTML = solicitudes.map(sol => {
    const config = estadoConfig[(sol.estado || '').toLowerCase()] || { bg: 'bg-gray-100', text: 'text-gray-800', icon: 'mdi:help-circle' };

    // Parsear días y tramos - formato: "L:T001,L:T002,M:T001" -> "L: 1ª Hora, 2ª Hora | M: 1ª Hora"
    const diasStr = sol.dias_semana || '';
    let diasTramosDisplay = '';

    if (diasStr.includes(':')) {
      // Agrupar tramos por día
      const diasTramos = {};
      const ordenDias = ['L', 'M', 'X', 'J', 'V', 'S', 'D'];

      diasStr.split(',').forEach(item => {
        const [dia, tramo] = item.trim().split(':');
        if (dia && tramo) {
          const diaUpper = dia.toUpperCase();
          if (!diasTramos[diaUpper]) diasTramos[diaUpper] = [];
          diasTramos[diaUpper].push(tramo);
        }
      });

      // Formatear como "L: 1ª Hora, 2ª Hora | M: 3ª Hora"
      diasTramosDisplay = ordenDias
        .filter(d => diasTramos[d])
        .map(dia => {
          const tramosNombres = diasTramos[dia].map(getNombreTramoCorto).join(', ');
          return `${dia}: ${tramosNombres}`;
        })
        .join(' | ');
    } else {
      // Formato antiguo: solo días, tramo único
      const dias = diasStr.split(',').map(d => d.trim().toUpperCase()).filter(Boolean);
      const tramoNombre = sol.nombre_tramo || getNombreTramoCorto(sol.id_tramo) || '';
      if (tramoNombre) {
        diasTramosDisplay = dias.map(d => `${d}: ${tramoNombre}`).join(' | ');
      } else {
        diasTramosDisplay = dias.join(' · ');
      }
    }

    // Formatear fechas
    const fechaInicio = sol.fecha_inicio ? new Date(sol.fecha_inicio).toLocaleDateString('es-ES', { day: 'numeric', month: 'short' }) : '';
    const fechaFin = sol.fecha_fin ? new Date(sol.fecha_fin).toLocaleDateString('es-ES', { day: 'numeric', month: 'short' }) : '';

    // Icono del recurso
    const recurso = AdminState.recursos?.find(r => r.id_recurso === sol.id_recurso);
    const iconoRecurso = recurso?.icono || 'mdi:cube-outline';

    return `
      <div class="px-6 py-4 border-b border-gray-100 hover:bg-gray-50/50 transition-colors flex items-center gap-4 cursor-pointer"
           onclick="abrirDetalleDesdeHistorial('${sol.id_solicitud}')">
        <div class="p-2 rounded-lg bg-gray-100 text-gray-600 shrink-0">
          <iconify-icon icon="${iconoRecurso}" class="text-xl"></iconify-icon>
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 flex-wrap">
            <span class="font-semibold text-gray-800 text-sm truncate">${escaparHTML(sol.nombre_recurso)}</span>
            <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-medium ${config.bg} ${config.text}">
              <iconify-icon icon="${config.icon}"></iconify-icon>
              ${escaparHTML(sol.estado)}
            </span>
          </div>
          <div class="text-xs text-gray-500 mt-0.5">
            <span class="font-medium">${escaparHTML(sol.nombre_usuario)}</span>
            <span class="mx-1">·</span>
            <span>${escaparHTML(diasTramosDisplay)}</span>
          </div>
          <div class="text-xs text-gray-400 mt-0.5">
            ${fechaInicio} → ${fechaFin}
          </div>
        </div>
        <button onclick="event.stopPropagation(); abrirDetalleDesdeHistorial('${sol.id_solicitud}')"
          class="p-2 hover:bg-gray-200 rounded-lg transition-colors shrink-0" title="${(sol.estado || '').toLowerCase() === 'pendiente' ? 'Gestionar' : 'Ver detalles'}">
          <iconify-icon icon="${(sol.estado || '').toLowerCase() === 'pendiente' ? 'mdi:pencil-outline' : 'mdi:eye-outline'}" class="text-gray-500"></iconify-icon>
        </button>
      </div>
    `;
  }).join('');
}

// Función auxiliar para abrir el modal correcto desde el historial
function abrirDetalleDesdeHistorial(idSolicitud) {
  // Buscar la solicitud en los datos del historial
  const sol = datosHistorialRecurrencias.find(s => s.id_solicitud === idSolicitud);
  if (!sol) {
    console.error('Solicitud no encontrada en historial:', idSolicitud);
    mostrarToast('Solicitud no encontrada', 'error');
    return;
  }

  const estado = (sol.estado || '').toLowerCase();
  if (estado === 'aprobada') {
    // Usar el modal de detalle de recurrencia activa
    abrirModalDetalleRecurrencia(sol);
  } else if (estado === 'rechazada') {
    // Para rechazadas, mostrar modal de solo lectura
    abrirModalDetalleRecurrenciaRechazada(sol);
  } else if (estado === 'cancelada') {
    // Para canceladas/revocadas, mostrar modal de solo lectura
    abrirModalDetalleRecurrenciaCancelada(sol);
  } else {
    // Solo para pendientes, usar el modal de gestión
    abrirModalGestionarSolicitud(idSolicitud);
  }
}
