    const supportedLangs = ['es', 'ca'];
    const defaultLang = 'ca';
    const browserLang = (navigator.language || '').toLowerCase().startsWith('ca') ? 'ca' : 'es';
    const resolveLang = () => {
      const candidate = supportedLangs.includes(window.APP_LANG)
        ? window.APP_LANG
        : (window.APP_LANG || browserLang || defaultLang);
      return supportedLangs.includes(candidate) ? candidate : defaultLang;
    };

    window.APP_LANG_RESOLVED = resolveLang();
    window.t = function t(key) {
      const parts = key.split('.');
      let node = I18N[resolveLang()];
      for (const part of parts) {
        node = node && node[part];
      }
      return node || key;
    };

    window.applyI18n = function applyI18n(root) {
      window.APP_LANG_RESOLVED = resolveLang();
      const scope = root || document;
      scope.querySelectorAll('[data-i18n]').forEach((el) => {
        const key = el.getAttribute('data-i18n');
        const value = window.t(key);
        if (value && value !== key) {
          el.textContent = value;
        }
      });

      scope.querySelectorAll('[data-i18n-attr]').forEach((el) => {
        const raw = el.getAttribute('data-i18n-attr');
        const pairs = raw.split(',').map((pair) => pair.trim()).filter(Boolean);
        pairs.forEach((pair) => {
          const parts = pair.split(':').map((p) => p.trim());
          const attr = parts[0];
          const key = parts[1];
          if (!attr || !key) return;
          const value = window.t(key);
          if (value && value !== key) {
            el.setAttribute(attr, value);
          }
        });
      });

      if (document && document.documentElement) {
        document.documentElement.lang = window.APP_LANG_RESOLVED;
      }
    };
